<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesWorld Academy</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<style>
:root{
  --bg:#07070f;--bg2:#0d0d1a;--bg3:#131326;--card:#0f0f1e;
  --gold:#F59E0B;--gold2:#D97706;--gold3:#FBBF24;
  --cyan:#06B6D4;--green:#10B981;--red:#EF4444;--purple:#8B5CF6;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#475569;
  --border:rgba(245,158,11,0.15);--border2:rgba(255,255,255,0.06);
  --grad:linear-gradient(135deg,#F59E0B,#D97706);
  --shadow:0 20px 60px rgba(0,0,0,0.5)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:rgba(245,158,11,0.3);border-radius:3px}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
.main{margin-left:240px;flex:1;min-height:100vh}
.topbar{position:sticky;top:0;z-index:40;background:rgba(7,7,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.content{padding:28px}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--border2)}
.sb-logo-main{font-size:1rem;font-weight:800;letter-spacing:.04em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-logo-sub{font-size:.62rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.sb-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:none;background:none;color:var(--text2);font-size:.855rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit}
.sb-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.sb-btn.active{background:rgba(245,158,11,.12);color:var(--gold)}
.sb-icon{font-size:1rem;width:20px;text-align:center}
.sb-user{padding:14px 10px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;background:var(--grad);color:#000;flex-shrink:0}
.sb-uname{font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sb-urole{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.sb-out{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:4px;transition:color .2s}
.sb-out:hover{color:var(--red)}
/* LOGIN */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.lp-blob{position:absolute;border-radius:50%;pointer-events:none}
.lb1{width:600px;height:600px;top:-200px;right:-200px;background:radial-gradient(circle,rgba(245,158,11,.07) 0%,transparent 70%)}
.lb2{width:400px;height:400px;bottom:-100px;left:-100px;background:radial-gradient(circle,rgba(6,182,212,.07) 0%,transparent 70%)}
.lcard{position:relative;z-index:2;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.l-logo{text-align:center;margin-bottom:32px}
.l-badge{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:16px;background:var(--grad);margin-bottom:14px;font-size:1.6rem}
.l-title{font-size:1.4rem;font-weight:800}
.l-sub{font-size:.82rem;color:var(--text2);margin-top:5px}
/* FORM */
.ff{margin-bottom:14px}
.ff label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
.ff input,.ff select,.ff textarea{width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none;transition:border-color .3s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--gold)}
.ff textarea{resize:vertical;min-height:80px}
/* BUTTONS */
.bg{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;background:var(--grad);color:#000;font-weight:700;font-size:.875rem;border:none;border-radius:10px;cursor:pointer;transition:transform .2s,box-shadow .2s;font-family:inherit}
.bg:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,.35)}
.bgh{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;background:rgba(255,255,255,.06);color:var(--text2);font-weight:500;font-size:.82rem;border:1px solid var(--border2);border-radius:9px;cursor:pointer;transition:all .2s;font-family:inherit}
.bgh:hover{background:rgba(255,255,255,.10);color:var(--text)}
.br{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;background:rgba(239,68,68,.10);color:#EF4444;font-weight:500;font-size:.8rem;border:1px solid rgba(239,68,68,.2);border-radius:8px;cursor:pointer;transition:all .2s;font-family:inherit}
.br:hover{background:rgba(239,68,68,.18)}
.bc{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;background:rgba(6,182,212,.10);color:var(--cyan);font-weight:500;font-size:.8rem;border:1px solid rgba(6,182,212,.2);border-radius:8px;cursor:pointer;transition:all .2s;font-family:inherit}
.bs{padding:7px 13px!important;font-size:.78rem!important}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:22px}
.ch{transition:transform .3s,box-shadow .3s,border-color .3s;cursor:pointer}
.ch:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.4);border-color:var(--border)}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* KPI */
.ki{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:12px}
.kv{font-size:1.9rem;font-weight:800;line-height:1}
.kl{font-size:.75rem;color:var(--text2);margin-top:3px;letter-spacing:.04em}
/* BADGE */
.bd{display:inline-flex;align-items:center;padding:2px 9px;border-radius:50px;font-size:.7rem;font-weight:700;letter-spacing:.04em}
.bgo{background:rgba(245,158,11,.15);color:var(--gold)}
.bgc{background:rgba(6,182,212,.15);color:var(--cyan)}
.bgg{background:rgba(16,185,129,.15);color:var(--green)}
.bgr{background:rgba(239,68,68,.15);color:var(--red)}
.bgp{background:rgba(139,92,246,.15);color:var(--purple)}
.bgx{background:rgba(255,255,255,.08);color:var(--text2)}
/* PROGRESS */
.pb{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin:10px 0}
.pf{height:100%;border-radius:3px;background:var(--grad);transition:width .6s}
/* VIDEO */
.vw{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;background:#000}
.vw iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 13px;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border2)}
.tbl td{padding:12px 13px;font-size:.855rem;border-bottom:1px solid var(--border2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mbox{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:34px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative}
.mtitle{font-size:1.15rem;font-weight:700;margin-bottom:22px}
.mclose{position:absolute;top:12px;right:14px;background:var(--bg3);border:none;color:var(--text2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:.85rem;transition:all .2s;font-family:inherit}
.mclose:hover{background:rgba(239,68,68,.2);color:var(--red)}
/* LESSON */
.lrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:background .2s;border:1px solid transparent;margin-bottom:3px}
.lrow:hover{background:var(--bg3)}
.lrow.la{background:rgba(245,158,11,.08);border-color:var(--border)}
.lcheck{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0}
.lcheck.done{background:var(--green);border-color:var(--green);color:white}
/* MISC */
.phdr{margin-bottom:24px}
.phdr h1{font-size:1.45rem;font-weight:800}
.phdr p{font-size:.855rem;color:var(--text2);margin-top:3px}
.fb{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.fc{display:flex;align-items:center;gap:10px}
.div1{height:1px;background:var(--border2);margin:18px 0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.post-av{width:38px;height:38px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#000;flex-shrink:0}
.pact{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;display:flex;align-items:center;gap:5px;transition:color .2s;padding:4px 8px;border-radius:6px;font-family:inherit}
.pact:hover{color:var(--gold);background:rgba(245,158,11,.08)}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.g4,.g3,.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const SBURL = 'https://khcipjozfamdrhspaxjh.supabase.co';
const SBKEY = 'sb_publishable_WhQ9J2Dphtxbgkk0vrTu3A_xV1lFLmZ';

async function sb(path, opts) {
  opts = opts || {};
  const res = await fetch(SBURL + '/rest/v1/' + path, {
    headers: {
      'apikey': SBKEY,
      'Authorization': 'Bearer ' + SBKEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    method: opts.method || 'GET',
    body: opts.body || undefined
  });
  const txt = await res.text();
  if (!txt) return [];
  try { return JSON.parse(txt); } catch(e) { return []; }
}

function ytId(url) {
  if (!url) return null;
  var m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&
?#]+)/);
  return m ? m[1] : null;
}

function ago(ts) {
  var d = (new Date() - new Date(ts)) / 1000;
  if (d < 60) return 'ora';
  if (d < 3600) return Math.floor(d/60) + ' min fa';
  if (d < 86400) return Math.floor(d/3600) + ' ore fa';
  return Math.floor(d/86400) + ' gg fa';
}

function ini(n) {
  if (!n) return '?';
  return n.split(' ').map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2);
}

function fmtD(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('it-IT', {day:'2-digit', month:'short', year:'numeric'});
}

function fmtDT(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('it-IT', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
}

/* ── LOGIN ─────────────────────────────────────────── */
function Login(props) {
  var onLogin = props.onLogin;
  var _u = useState(''); var u = _u[0]; var setU = _u[1];
  var _p = useState(''); var p = _p[0]; var setP = _p[1];
  var _e = useState(''); var err = _e[0]; var setErr = _e[1];
  var _l = useState(false); var loading = _l[0]; var setLoading = _l[1];

  async function doLogin(e) {
    e.preventDefault();
    setErr(''); setLoading(true);
    try {
      var rows = await sb('utenti?username=eq.' + encodeURIComponent(u) + '&password=eq.' + encodeURIComponent(p) + '&attivo=eq.true');
      if (rows && rows.length) { onLogin(rows[0]); }
      else { setErr('Credenziali errate o account non attivo.'); }
    } catch(ex) { setErr('Errore di connessione. Riprova.'); }
    setLoading(false);
  }

  return (
    <div className="lp">
      <div className="lp-blob lb1"></div>
      <div className="lp-blob lb2"></div>
      <div className="lcard">
        <div className="l-logo">
          <div className="l-badge">🏆</div>
          <div className="l-title">SalesWorld Academy</div>
          <div className="l-sub">Accedi alla tua area riservata</div>
        </div>
        <form onSubmit={doLogin}>
          <div className="ff">
            <label>Username</label>
            <input value={u} onChange={function(e){setU(e.target.value)}} placeholder="Il tuo username" required />
          </div>
          <div className="ff">
            <label>Password</label>
            <input type="password" value={p} onChange={function(e){setP(e.target.value)}} placeholder="La tua password" required />
          </div>
          {err && (
            <div style={{color:'#EF4444',fontSize:'.82rem',marginBottom:12,padding:'8px 12px',background:'rgba(239,68,68,.10)',borderRadius:8}}>
              {err}
            </div>
          )}
          <button type="submit" className="bg" style={{width:'100%',marginTop:4}} disabled={loading}>
            {loading ? '⏳ Accesso...' : '🚀 Accedi'}
          </button>
        </form>
        <div style={{textAlign:'center',marginTop:20,fontSize:'.75rem',color:'var(--text3)'}}>
          Non hai accesso? Contatta il manager.
        </div>
      </div>
    </div>
  );
}

/* ── SIDEBAR ────────────────────────────────────────── */
function Sidebar(props) {
  var user = props.user; var tab = props.tab; var setTab = props.setTab; var onLogout = props.onLogout;
  var isAdmin = user.ruolo === 'admin';
  var isIstr = user.ruolo === 'istruttore';
  var roleLabel = isAdmin ? 'Manager' : (isIstr ? 'Istruttore' : 'Studente');
  var roleColor = isAdmin ? 'var(--gold)' : (isIstr ? 'var(--purple)' : 'var(--cyan)');

  var navItems = isAdmin
    ? [['dashboard','📊','Dashboard'],['studenti','👥','Studenti'],['istruttori','🎓','Istruttori'],['corsi','📚','Corsi'],['community','💬','Community'],['risorse','📁','Risorse'],['live','🎥','Live & Replay']]
    : (isIstr
      ? [['dashboard','📊','Dashboard'],['corsi','📚','Corsi'],['community','💬','Community'],['risorse','📁','Risorse'],['live','🎥','Live']]
      : [['dashboard','🏠','Dashboard'],['corsi','📚','Corsi'],['community','💬','Community'],['risorse','📁','Risorse'],['live','🎥','Live']]);

  return (
    <div className="sidebar">
      <div className="sb-logo">
        <div className="sb-logo-main">⚡ SalesWorld</div>
        <div className="sb-logo-sub">Academy Platform</div>
      </div>
      <div className="sb-nav">
        {navItems.map(function(n) {
          return (
            <button key={n[0]} className={'sb-btn' + (tab === n[0] ? ' active' : '')} onClick={function(){ setTab(n[0]); }}>
              <span className="sb-icon">{n[1]}</span>
              {n[2]}
            </button>
          );
        })}
      </div>
      <div className="sb-user">
        <div className="sb-av">{ini(user.nome)}</div>
        <div style={{flex:1,minWidth:0}}>
          <div className="sb-uname">{user.nome}</div>
          <div className="sb-urole" style={{color:roleColor}}>{roleLabel}</div>
        </div>
        <button className="sb-out" title="Esci" onClick={onLogout}>⏻</button>
      </div>
    </div>
  );
}

/* ── COMMUNITY ──────────────────────────────────────── */
function CommunityView(props) {
  var user = props.user;
  var _posts = useState([]); var posts = _posts[0]; var setPosts = _posts[1];
  var _txt = useState(''); var txt = _txt[0]; var setTxt = _txt[1];
  var _cat = useState('generale'); var cat = _cat[0]; var setCat = _cat[1];
  var _filt = useState('tutti'); var filt = _filt[0]; var setFilt = _filt[1];
  var _open = useState({}); var open = _open[0]; var setOpen = _open[1];
  var _nc = useState({}); var nc = _nc[0]; var setNc = _nc[1];
  var _comm = useState({}); var comm = _comm[0]; var setComm = _comm[1];
  var isAdmin = user.ruolo === 'admin';

  function load() { sb('community_posts?order=pinnato.desc,created_at.desc').then(setPosts); }
  useEffect(function(){ load(); }, []);

  async function loadComm(pid) {
    var rows = await sb('commenti?post_id=eq.' + pid + '&order=created_at.asc');
    setComm(function(prev){ var n = {}; Object.assign(n, prev); n[pid] = rows; return n; });
  }

  async function toggleComm(pid) {
    var next = !open[pid];
    setOpen(function(prev){ var n = {}; Object.assign(n, prev); n[pid] = next; return n; });
    if (next && !comm[pid]) await loadComm(pid);
  }

  async function pubPost() {
    if (!txt.trim()) return;
    await sb('community_posts', {method:'POST', body: JSON.stringify({autore_id:user.id,autore_nome:user.nome,autore_ruolo:user.ruolo,contenuto:txt,categoria:cat,like_count:0})});
    setTxt(''); load();
  }

  async function likePost(p) {
    await sb('community_posts?id=eq.' + p.id, {method:'PATCH', body: JSON.stringify({like_count: (p.like_count||0)+1})});
    load();
  }

  async function pinPost(p) {
    await sb('community_posts?id=eq.' + p.id, {method:'PATCH', body: JSON.stringify({pinnato: !p.pinnato})});
    load();
  }

  async function delPost(id) {
    if (!window.confirm('Eliminare?')) return;
    await sb('community_posts?id=eq.' + id, {method:'DELETE'});
    load();
  }

  async function pubComm(pid) {
    var t = nc[pid];
    if (!t || !t.trim()) return;
    await sb('commenti', {method:'POST', body: JSON.stringify({post_id:pid,autore_id:user.id,autore_nome:user.nome,contenuto:t})});
    setNc(function(prev){ var n = {}; Object.assign(n, prev); n[pid] = ''; return n; });
    loadComm(pid);
  }

  var cats = ['tutti','generale','domande','successi','risorse'];
  var catLbl = {generale:'💬 Generale',domande:'❓ Domande',successi:'🏆 Successi',risorse:'📁 Risorse'};
  var catCls = {generale:'bgx',domande:'bgc',successi:'bgo',risorse:'bgp'};
  var filtered = filt === 'tutti' ? posts : posts.filter(function(p){ return p.categoria === filt; });

  return (
    <div>
      <div className="phdr">
        <h1>💬 Community</h1>
        <p>Condividi, impara e cresci con gli altri membri</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:20,alignItems:'start'}}>
        <div>
          <div className="card" style={{marginBottom:18}}>
            <div style={{fontWeight:700,marginBottom:12,fontSize:'.9rem'}}>✍️ Scrivi qualcosa</div>
            <textarea
              style={{width:'100%',padding:'10px 12px',background:'var(--bg2)',border:'1.5px solid var(--border2)',borderRadius:10,color:'var(--text)',fontFamily:'inherit',fontSize:'.875rem',outline:'none',resize:'vertical',minHeight:80,display:'block',marginBottom:10}}
              value={txt}
              onChange={function(e){setTxt(e.target.value)}}
              placeholder="Condividi un pensiero, una domanda, un successo..."
            />
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <select value={cat} onChange={function(e){setCat(e.target.value)}} style={{padding:'7px 12px',background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text)',fontSize:'.82rem',fontFamily:'inherit',outline:'none'}}>
                <option value="generale">💬 Generale</option>
                <option value="domande">❓ Domande</option>
                <option value="successi">🏆 Successi</option>
                <option value="risorse">📁 Risorse</option>
              </select>
              <button className="bg bs" onClick={pubPost}>📤 Pubblica</button>
            </div>
          </div>
          {filtered.map(function(post) {
            return (
              <div key={post.id} className="card" style={{marginBottom:12,borderColor: post.pinnato ? 'var(--border)' : 'var(--border2)'}}>
                {post.pinnato && <div style={{fontSize:'.7rem',color:'var(--gold)',fontWeight:700,marginBottom:10}}>📌 POST PINNATO</div>}
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <div className="post-av">{ini(post.autore_nome)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:'.875rem'}}>
                      {post.autore_nome}
                      {post.autore_ruolo === 'admin' && <span className="bd bgo" style={{marginLeft:6}}>Manager</span>}
                      {post.autore_ruolo === 'istruttore' && <span className="bd bgp" style={{marginLeft:6}}>Istruttore</span>}

/* ── COURSE VIEWER ──────────────────────────────────── */
function CourseViewer(props) {
  var corso = props.corso; var userId = props.userId; var onBack = props.onBack;
  var _mod = useState([]); var mods = _mod[0]; var setMods = _mod[1];
  var _lez = useState([]); var lez = _lez[0]; var setLez = _lez[1];
  var _prog = useState([]); var prog = _prog[0]; var setProg = _prog[1];
  var _latt = useState(null); var latt = _latt[0]; var setLatt = _latt[1];
  var _mopen = useState(null); var mopen = _mopen[0]; var setMopen = _mopen[1];

  useEffect(function(){
    sb('moduli?corso_id=eq.' + corso.id + '&order=ordine.asc').then(function(m){
      setMods(m);
      if (m.length) setMopen(m[0].id);
    });
    sb('lezioni?corso_id=eq.' + corso.id + '&order=ordine.asc').then(function(l){
      setLez(l);
      if (l.length) setLatt(l[0]);
    });
    if (userId) sb('progressi?studente_id=eq.' + userId).then(setProg);
  }, [corso.id]);

  function isDone(lid) { return prog.some(function(p){ return p.lezione_id === lid && p.completata; }); }

  async function segna(lid) {
    var exist = prog.find(function(p){ return p.lezione_id === lid; });
    if (exist) { await sb('progressi?id=eq.' + exist.id, {method:'PATCH', body:JSON.stringify({completata:true})}); }
    else { await sb('progressi', {method:'POST', body:JSON.stringify({studente_id:userId,lezione_id:lid,completata:true})}); }
    if (userId) sb('progressi?studente_id=eq.' + userId).then(setProg);
  }

  function lezMod(mid) { return lez.filter(function(l){ return l.modulo_id === mid; }); }
  var tot = lez.length;
  var comp = lez.filter(function(l){ return isDone(l.id); }).length;
  var pct = tot ? Math.round(comp/tot*100) : 0;
  var vid = latt ? ytId(latt.video_url) : null;

  return (
    <div>
      <div style={{marginBottom:18,display:'flex',alignItems:'center',gap:12}}>
        <button className="bgh" onClick={onBack}>← Tutti i corsi</button>
        <div style={{fontWeight:700,fontSize:'1.1rem'}}>{corso.emoji||'📚'} {corso.titolo}</div>
        <div style={{marginLeft:'auto',fontSize:'.82rem',color:'var(--text2)'}}>Progresso: <strong style={{color:'var(--gold)'}}>{pct}%</strong></div>
      </div>
      <div className="pb"><div className="pf" style={{width:pct+'%'}}></div></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:20,alignItems:'start',marginTop:16}}>
        <div>
          {latt ? (
            <div className="card">
              {vid ? (
                <div className="vw" style={{marginBottom:18}}>
                  <iframe src={'https://www.youtube.com/embed/' + vid + '?rel=0'} allowFullScreen title={latt.titolo}></iframe>
                </div>
              ) : (
                <div style={{height:180,background:'var(--bg2)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'3rem',marginBottom:18}}>🎬</div>
              )}
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                <div>
                  <div style={{fontWeight:800,fontSize:'1.15rem',marginBottom:5}}>{latt.titolo}</div>
                  {latt.durata_minuti > 0 && <div style={{fontSize:'.78rem',color:'var(--text2)'}}>⏱️ {latt.durata_minuti} min</div>}
                </div>
                {isDone(latt.id) ? (
                  <div style={{color:'var(--green)',fontWeight:700,fontSize:'.875rem',display:'flex',alignItems:'center',gap:5}}>✅ Completata</div>
                ) : (
                  <button className="bg bs" onClick={function(){ segna(latt.id); }}>✅ Segna completata</button>
                )}
              </div>
              {latt.contenuto && (
                <div style={{marginTop:18,paddingTop:14,borderTop:'1px solid var(--border2)',fontSize:'.9rem',lineHeight:1.8,color:'var(--text2)'}}>{latt.contenuto}</div>
              )}
            </div>
          ) : (
            <div className="card" style={{textAlign:'center',padding:60,color:'var(--text3)'}}>Seleziona una lezione →</div>
          )}
        </div>
        <div>
          <div className="card" style={{padding:14}}>
            <div style={{fontWeight:700,fontSize:'.875rem',marginBottom:14}}>📋 Contenuto</div>
            {mods.map(function(m) {
              var lm = lezMod(m.id);
              var cm = lm.filter(function(l){ return isDone(l.id); }).length;
              return (
                <div key={m.id} style={{marginBottom:6}}>
                  <button onClick={function(){ setMopen(mopen === m.id ? null : m.id); }} style={{width:'100%',background:mopen===m.id?'rgba(245,158,11,.08)':'var(--bg3)',border:'1px solid '+(mopen===m.id?'var(--border)':'transparent'),borderRadius:9,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:'.855rem',fontWeight:600}}>
                    <span>{m.titolo}</span>

function AdminUtenti(props) {
  var user = props.user; var ruolo = props.ruolo;

  var _modal = useState(false); var modal = _modal[0]; var setModal = _modal[1];
  var _form = useState({username:'',password:'',nome:'',email:'',attivo:true,bio:''});
  var form = _form[0]; var setForm = _form[1];
  var _eid = useState(null); var eid = _eid[0]; var setEid = _eid[1];
  var _src = useState(''); var src = _src[0]; var setSrc = _src[1];
  var label = ruolo === 'istruttore' ? 'Istruttori' : 'Studenti';

  function load() { sb('utenti?ruolo=eq.' + ruolo + '&order=created_at.desc').then(setLista); }
  useEffect(function(){ load(); }, [ruolo]);

  async function salva() {
    if (!form.username || !form.password || !form.nome) return;
    if (eid) { await sb('utenti?id=eq.' + eid, {method:'PATCH', body:JSON.stringify(form)}); }
    else { await sb('utenti', {method:'POST', body:JSON.stringify({...form, ruolo:ruolo})}); }
    setModal(false); setEid(null); setForm({username:'',password:'',nome:'',email:'',attivo:true,bio:''});
    load();
  }

  async function toggleA(s) {
    await sb('utenti?id=eq.' + s.id, {method:'PATCH', body:JSON.stringify({attivo:!s.attivo})});
    load();
  }

  async function del(id) {
    if (!window.confirm('Eliminare utente?')) return;
    await sb('utenti?id=eq.' + id, {method:'DELETE'});
    load();
  }

  function edit(s) {
    setForm({username:s.username,password:s.password,nome:s.nome||'',email:s.email||'',attivo:s.attivo,bio:s.bio||''});
    setEid(s.id); setModal(true);
  }

  function closeModal() { setModal(false); setEid(null); setForm({username:'',password:'',nome:'',email:'',attivo:true,bio:''}); }

  var filt = lista.filter(function(s){
    return (s.nome||'').toLowerCase().indexOf(src.toLowerCase()) >= 0 || (s.username||'').toLowerCase().indexOf(src.toLowerCase()) >= 0;
  });

  return (
    <div>
      <div className="phdr">
        <div className="fb">
          <div><h1>{'👥'} {label}</h1><p>Gestisci gli {label.toLowerCase()} della piattaforma</p></div>
          <div style={{display:'flex',gap:10}}>
            <input style={{padding:'9px 14px',background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:9,color:'var(--text)',outline:'none',width:180,fontFamily:'inherit',fontSize:'.855rem'}} placeholder="🔍 Cerca..." value={src} onChange={function(e){setSrc(e.target.value)}} />
            <button className="bg" onClick={function(){ setModal(true); }}>+ Aggiungi</button>
          </div>
        </div>
      </div>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <table className="tbl">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Username</th>
              <th>Email</th>
              <th>Stato</th>
              <th>Iscritto</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody>
            {filt.map(function(s) {
              return (
                <tr key={s.id}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:32,height:32,borderRadius:8,background:'var(--grad)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.78rem',fontWeight:700,color:'#000',flexShrink:0}}>{ini(s.nome)}</div>
                      <div style={{fontWeight:600,fontSize:'.875rem'}}>{s.nome}</div>
                    </div>
                  </td>
                  <td><span style={{fontFamily:'monospace',fontSize:'.82rem',background:'var(--bg3)',padding:'2px 8px',borderRadius:5}}>{s.username}</span></td>
                  <td style={{color:'var(--text2)',fontSize:'.82rem'}}>{s.email||'—'}</td>
                  <td><span className={'bd ' + (s.attivo?'bgg':'bgr')}>{s.attivo?'Attivo':'Disattivo'}</span></td>
                  <td style={{color:'var(--text3)',fontSize:'.78rem'}}>{fmtD(s.created_at)}</td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="bgh bs" onClick={function(){ edit(s); }}>✏️</button>
                      <button className={'bs ' + (s.attivo ? 'br' : 'bc')} onClick={function(){ toggleA(s); }}>{s.attivo?'🔒':'🔓'}</button>
                      <button className="br bs" onClick={function(){ del(s.id); }}>🗑️</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filt.length === 0 && <div style={{textAlign:'center',padding:40,color:'var(--text3)'}}>Nessun utente trovato.</div>}
      </div>
      {modal && (
        <div className="mov" onClick={function(e){ if(e.target===e.currentTarget) closeModal(); }}>
          <div className="mbox">
            <button className="mclose" onClick={closeModal}>✕</button>
            <div className="mtitle">{eid ? 'Modifica' : 'Nuovo ' + label.slice(0,-1)}</div>
            <div className="frow">
              <div className="ff"><label>Nome *</label><input value={form.nome} onChange={function(e){setForm(function(f){return {...f,nome:e.target.value};})}} placeholder="Mario Rossi" /></div>
              <div className="ff"><label>Email</label><input type="email" value={form.email} onChange={function(e){setForm(function(f){return {...f,email:e.target.value};})}} /></div>
            </div>
            <div className="frow">
              <div className="ff"><label>Username *</label><input value={form.username} onChange={function(e){setForm(function(f){return {...f,username:e.target.value};})}} /></div>
              <div className="ff"><label>Password *</label><input value={form.password} onChange={function(e){setForm(function(f){return {...f,password:e.target.value};})}} /></div>
            </div>
            <div className="ff">
              <label>Stato</label>
              <select value={form.attivo?'si':'no'} onChange={function(e){setForm(function(f){return {...f,attivo:e.target.value==='si'};});}}>
                <option value="si">✅ Attivo</option>
                <option value="no">🔒 Disattivo</option>
              </select>
            </div>
            <button className="bg" style={{width:'100%',marginTop:8}} onClick={salva}>💾 Salva</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── DASHBOARD ──────────────────────────────────────── */
function Dashboard(props) {
  var user = props.user; var setTab = props.setTab;
  var isAdmin = user.ruolo === 'admin';
  var _stats = useState({studenti:0,istruttori:0,corsi:0,lezioni:0,post:0,completate:0});
  var stats = _stats[0]; var setStats = _stats[1];
  var _live = useState([]); var live = _live[0]; var setLive = _live[1];

  useEffect(function(){
    if (isAdmin) {
      sb('utenti?ruolo=eq.studente').then(function(r){ setStats(function(s){ return {...s,studenti:r.length}; }); });
      sb('utenti?ruolo=eq.istruttore').then(function(r){ setStats(function(s){ return {...s,istruttori:r.length}; }); });
    }
    sb('corsi?pubblicato=eq.true').then(function(r){ setStats(function(s){ return {...s,corsi:r.length}; }); });
    sb('lezioni').then(function(r){ setStats(function(s){ return {...s,lezioni:r.length}; }); });
    sb('community_posts').then(function(r){ setStats(function(s){ return {...s,post:r.length}; }); });
    if (!isAdmin) {
      sb('progressi?studente_id=eq.' + user.id + '&completata=eq.true').then(function(r){ setStats(function(s){ return {...s,completate:r.length}; }); });
    }
    sb('live_sessioni?order=data_ora.asc').then(function(r){
      setLive(r.filter(function(s){ return s.data_ora && new Date(s.data_ora) > new Date(); }).slice(0,3));
    });
  }, []);

  var pct = stats.lezioni ? Math.round(stats.completate / stats.lezioni * 100) : 0;

  return (
    <div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:'.82rem',color:'var(--text2)'}}>Bentornato,</div>
        <div style={{fontSize:'1.6rem',fontWeight:800}}>
          {user.nome} {isAdmin ? '👑' : '⚡'}
        </div>
        <div style={{fontSize:'.875rem',color:'var(--text3)',marginTop:3}}>
          {isAdmin ? 'Gestisci la tua Academy' : 'Continua il tuo percorso verso l'eccellenza'}
        </div>
      </div>
      <div className="g4" style={{marginBottom:22}}>
        {isAdmin && (
          <div className="card">
            <div className="ki" style={{background:'rgba(245,158,11,.12)'}}>👥</div>
            <div className="kv" style={{color:'var(--gold)'}}>{stats.studenti}</div>
            <div className="kl">Studenti attivi</div>
          </div>
        )}
        {isAdmin && (
          <div className="card">
            <div className="ki" style={{background:'rgba(139,92,246,.12)'}}>🎓</div>
            <div className="kv" style={{color:'var(--purple)'}}>{stats.istruttori}</div>
            <div className="kl">Istruttori</div>
          </div>
        )}
        <div className="card">
          <div className="ki" style={{background:'rgba(6,182,212,.12)'}}>📚</div>
          <div className="kv" style={{color:'var(--cyan)'}}>{stats.corsi}</div>
          <div className="kl">Corsi disponibili</div>
        </div>
        <div className="card">
          <div className="ki" style={{background:'rgba(16,185,129,.12)'}}>🎬</div>
          <div className="kv" style={{color:'var(--green)'}}>{stats.lezioni}</div>
          <div className="kl">Lezioni totali</div>
        </div>
        <div className="card">
          <div className="ki" style={{background:'rgba(245,158,11,.12)'}}>💬</div>
          <div className="kv" style={{color:'var(--gold)'}}>{stats.post}</div>
          <div className="kl">Post community</div>
        </div>
        {!isAdmin && (
          <div className="card">
            <div className="ki" style={{background:'rgba(16,185,129,.12)'}}>✅</div>
            <div className="kv" style={{color:'var(--green)'}}>{stats.completate}</div>
            <div className="kl">Lezioni completate</div>
          </div>
        )}
      </div>
      <div className="g2">
        {!isAdmin && (
          <div className="card">
            <div style={{fontWeight:700,marginBottom:14}}>📈 Il tuo progresso</div>
            <div style={{fontSize:'3rem',fontWeight:800,color:'var(--gold)',marginBottom:6}}>{pct}%</div>
            <div className="pb"><div className="pf" style={{width:pct+'%'}}></div></div>
            <div style={{fontSize:'.82rem',color:'var(--text2)'}}>{stats.completate} lezioni su {stats.lezioni}</div>
            <button className="bg bs" style={{marginTop:14}} onClick={function(){ setTab('corsi'); }}>Vai ai corsi →</button>
          </div>
        )}
        <div className="card">
          <div style={{fontWeight:700,marginBottom:14}}>📅 Prossime live</div>
          {live.length > 0 ? live.map(function(s) {
            return (
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--border2)'}}>
                <div style={{fontSize:'1.4rem'}}>🎥</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:'.875rem'}}>{s.titolo}</div>
                  <div style={{fontSize:'.72rem',color:'var(--text3)'}}>{fmtDT(s.data_ora)}</div>
                </div>
                {s.url_join && <a href={s.url_join} target="_blank" className="bg bs" style={{textDecoration:'none'}}>Entra</a>}
              </div>
            );
          }) : (
            <div style={{color:'var(--text3)',fontSize:'.82rem'}}>Nessuna live programmata.</div>
          )}
        </div>
        {isAdmin && (
          <div className="card">
            <div style={{fontWeight:700,marginBottom:14}}>⚡ Azioni rapide</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <button className="bg" style={{width:'100%'}} onClick={function(){ setTab('studenti'); }}>+ Aggiungi studente</button>
              <button className="bgh" style={{width:'100%'}} onClick={function(){ setTab('corsi'); }}>📚 Gestisci corsi</button>
              <button className="bgh" style={{width:'100%'}} onClick={function(){ setTab('live'); }}>🎥 Programma live</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── TOPBAR ─────────────────────────────────────────── */
function Topbar(props) {
  var user = props.user;
  var isAdmin = user.ruolo === 'admin';
  var isIstr = user.ruolo === 'istruttore';
  var roleLabel = isAdmin ? '👑 Manager' : (isIstr ? '🎓 Istruttore' : '🎓 Studente');
  var roleCls = isAdmin ? 'bgo' : (isIstr ? 'bgp' : 'bgc');
  return (
    <div className="topbar">
      <div style={{fontWeight:700,color:'var(--text2)',fontSize:'.875rem'}}>SalesWorld Academy</div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span className={'bd ' + roleCls}>{roleLabel}</span>
        <span style={{fontSize:'.855rem',fontWeight:500}}>{user.nome}</span>
      </div>
    </div>
  );
}

/* ── MAIN VIEWS ─────────────────────────────────────── */
function MainView(props) {
  var user = props.user; var onLogout = props.onLogout;
  var _tab = useState('dashboard'); var tab = _tab[0]; var setTab = _tab[1];
  var isAdmin = user.ruolo === 'admin';

  function renderTab() {
    if (tab === 'dashboard') return <Dashboard user={user} setTab={setTab} />;
    if (tab === 'corsi') return isAdmin ? <AdminCorsi /> : <CorsiView user={user} />;
    if (tab === 'studenti') return <AdminUtenti user={user} ruolo="studente" />;
    if (tab === 'istruttori') return <AdminUtenti user={user} ruolo="istruttore" />;
    if (tab === 'community') return <CommunityView user={user} />;
    if (tab === 'risorse') return <RisorseView user={user} />;
    if (tab === 'live') return <LiveView user={user} />;
    return null;
  }

  return (
    <div className="layout">
      <Sidebar user={user} tab={tab} setTab={setTab} onLogout={onLogout} />
      <div className="main">
        <Topbar user={user} />
        <div className="content">{renderTab()}</div>
      </div>
    </div>
  );
}

/* ── APP ────────────────────────────────────────────── */
function App() {
  var _user = useState(null); var user = _user[0]; var setUser = _user[1];

  function login(u) { setUser(u); }
  function logout() { setUser(null); }

  if (!user) return <Login onLogin={login} />;
  return <MainView user={user} onLogout={logout} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>

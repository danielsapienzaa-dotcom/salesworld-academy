<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesWorld Academy</title>
<style>
:root{--bg:#07070f;--bg2:#0d0d1a;--bg3:#131326;--card:#0f0f1e;--gold:#F59E0B;--cyan:#06B6D4;--green:#10B981;--red:#EF4444;--purple:#8B5CF6;--text:#F1F5F9;--text2:#94A3B8;--text3:#475569;--border2:rgba(255,255,255,0.07);--grad:linear-gradient(135deg,#F59E0B,#D97706)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(245,158,11,.25);border-radius:4px}
.layout{display:flex;min-height:100vh}
.sidebar{width:250px;background:linear-gradient(180deg,#0a0a18,#0d0d1a);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
.main-area{margin-left:250px;flex:1;min-height:100vh}
.topbar{position:sticky;top:0;z-index:40;background:rgba(7,7,15,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border2);padding:13px 28px;display:flex;align-items:center;justify-content:space-between}
.content{padding:28px 32px}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border2)}
.sb-logo-icon{width:38px;height:38px;border-radius:10px;background:var(--grad);display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:10px;box-shadow:0 4px 14px rgba(245,158,11,.35)}
.sb-logo-main{font-size:1.05rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-logo-sub{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.14em;margin-top:1px}
.sb-nav{flex:1;padding:10px;overflow-y:auto}
.sb-btn{width:100%;display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;border:none;background:none;color:var(--text3);font-size:.84rem;font-weight:500;cursor:pointer;text-align:left;font-family:inherit;transition:all .18s;margin-bottom:1px}
.sb-btn:hover{background:rgba(255,255,255,.05);color:var(--text2)}
.sb-btn.active{background:rgba(245,158,11,.13);color:var(--gold);font-weight:600}
.sb-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;background:rgba(255,255,255,.04);flex-shrink:0}
.sb-btn.active .sb-ico{background:rgba(245,158,11,.2)}
.sb-user{padding:12px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:10px}
.sb-logout{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.85rem;padding:5px;border-radius:7px;font-family:inherit;transition:all .18s;margin-left:auto}
.sb-logout:hover{color:var(--red);background:rgba(239,68,68,.1)}
.card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:22px;transition:border-color .2s}
.card-h{cursor:pointer;transition:transform .22s,box-shadow .22s,border-color .22s}
.card-h:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.45);border-color:rgba(245,158,11,.18)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:.855rem;font-family:inherit;transition:all .18s;white-space:nowrap}
.btn-g{background:var(--grad);color:#000;padding:10px 20px;box-shadow:0 2px 12px rgba(245,158,11,.2)}
.btn-g:hover{box-shadow:0 6px 22px rgba(245,158,11,.38);transform:translateY(-1px)}
.btn-g:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-gh{background:rgba(255,255,255,.06);color:var(--text2);padding:9px 16px;border:1px solid var(--border2)}
.btn-gh:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn-r{background:rgba(239,68,68,.1);color:#EF4444;padding:8px 13px;border:1px solid rgba(239,68,68,.2)}
.btn-r:hover{background:rgba(239,68,68,.18)}
.btn-cy{background:rgba(6,182,212,.1);color:var(--cyan);padding:8px 13px;border:1px solid rgba(6,182,212,.2)}
.btn-cy:hover{background:rgba(6,182,212,.18)}
.btn-sm{padding:5px 11px!important;font-size:.75rem!important;border-radius:7px!important}
.btn-xs{padding:3px 8px!important;font-size:.7rem!important;border-radius:6px!important}
.ff{margin-bottom:14px}
.ff label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.fi{width:100%;padding:10px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s}
.fi:focus{border-color:rgba(245,158,11,.5)}
textarea.fi{resize:vertical;min-height:78px;display:block}
.badge{display:inline-flex;padding:2px 9px;border-radius:50px;font-size:.68rem;font-weight:700}
.bg-gold{background:rgba(245,158,11,.15);color:var(--gold)}
.bg-cyan{background:rgba(6,182,212,.15);color:var(--cyan)}
.bg-green{background:rgba(16,185,129,.15);color:var(--green)}
.bg-red{background:rgba(239,68,68,.15);color:var(--red)}
.bg-purple{background:rgba(139,92,246,.15);color:var(--purple)}
.bg-gray{background:rgba(255,255,255,.08);color:var(--text2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g2f{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pbar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:var(--grad)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 14px;font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border2)}
.tbl td{padding:12px 14px;font-size:.855rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);animation:fadeIn .15s}
.modal-box{background:linear-gradient(135deg,#0f0f1e,#0d0d1a);border:1px solid rgba(245,158,11,.18);border-radius:20px;padding:32px;width:92%;max-width:520px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:22px}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .18s}
.modal-close:hover{background:rgba(239,68,68,.2);color:var(--red);border-color:rgba(239,68,68,.3)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.login-card{position:relative;z-index:2;background:linear-gradient(135deg,#0f0f1e,#0d0d1a);border:1px solid rgba(245,158,11,.18);border-radius:24px;padding:44px;width:100%;max-width:410px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.vw{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;background:#000}
.vw iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.lrow{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:background .15s}
.lrow:hover{background:rgba(255,255,255,.04)}
.lrow.active{background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.18)}
.lck{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.62rem;flex-shrink:0}
.lck.done{background:var(--green);border-color:var(--green);color:white}
.pact{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;padding:5px 10px;border-radius:7px;font-family:inherit;transition:all .15s}
.pact:hover{color:var(--gold);background:rgba(245,158,11,.08)}
.page-hdr{margin-bottom:26px}
.page-hdr h1{font-size:1.5rem;font-weight:800}
.page-hdr p{font-size:.855rem;color:var(--text2);margin-top:4px}
.fb{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.sep{border:none;border-top:1px solid var(--border2);margin:14px 0}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:slideUp .22s ease-out}
@media(max-width:900px){.sidebar{display:none}.main-area{margin-left:0}.g4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g4,.g3,.g2,.g2f{grid-template-columns:1fr}.content{padding:16px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
'use strict';
var SBURL='https://khcipjozfamdrhspaxjh.supabase.co';
var SBKEY='sb_publishable_WhQ9J2Dphtxbgkk0vrTu3A_xV1lFLmZ';

function sb(path,opts){
  opts=opts||{};
  return fetch(SBURL+'/rest/v1/'+path,{
    method:opts.method||'GET',
    headers:{'apikey':SBKEY,'Authorization':'Bearer '+SBKEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:opts.body
  }).then(function(r){return r.text();}).then(function(t){try{return t?JSON.parse(t):[]}catch(e){return[]}});
}

var _s={},_root=null,_rq=false;
function S(k,d){return k in _s?_s[k]:d;}
function set(k,v){_s[k]=v;if(!_rq){_rq=true;requestAnimationFrame(function(){_rq=false;draw();});}}
function draw(){if(_root)_root.innerHTML=render();}

var _h={},_hc=0;
function fn(f){var id='e'+(++_hc);_h[id]=f;return id;}
['click','change'].forEach(function(ev){
  document.addEventListener(ev,function(e){
    var t=e.target;
    while(t&&t!==document){
      var k=t.dataset&&t.dataset[ev];
      if(k&&_h[k]){_h[k](e);return;}
      t=t.parentElement;
    }
  });
});

function ytId(u){if(!u)return null;var m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&\n?#]+)/);return m?m[1]:null;}
function ini(n){if(!n)return'?';return n.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function fmtD(ts){if(!ts)return'-';return new Date(ts).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});}
function fmtDT(ts){if(!ts)return'-';return new Date(ts).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function ago(ts){var d=(Date.now()-new Date(ts))/1000;if(d<60)return'ora';if(d<3600)return Math.floor(d/60)+' min fa';if(d<86400)return Math.floor(d/3600)+' ore fa';return Math.floor(d/86400)+' gg fa';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function av(name,size){size=size||36;var br=Math.round(size*.28);return '<div style="width:'+size+'px;height:'+size+'px;border-radius:'+br+'px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+Math.round(size*.22)+'px;color:#000;flex-shrink:0">'+ini(name)+'</div>';}
function rv(id){var el=document.getElementById(id);return el?el.value:'';}
function label(txt,inp){return '<div class="ff"><label>'+esc(txt)+'</label>'+inp+'</div>';}
function inp(id,placeholder,type,val){return '<input id="'+id+'" type="'+(type||'text')+'" class="fi" placeholder="'+esc(placeholder||'')+'" value="'+esc(val||'')+'" autocomplete="off">';}
function ta(id,placeholder,val){return '<textarea id="'+id+'" class="fi" placeholder="'+esc(placeholder||'')+'">'+esc(val||'')+'</textarea>';}
function sel(id,options,val){var opts=options.map(function(o){return '<option value="'+esc(o[0])+'"'+(val===o[0]?' selected':'')+'>'+esc(o[1])+'</option>';}).join('');return '<select id="'+id+'" class="fi" style="cursor:pointer;background:var(--bg2)">'+opts+'</select>';}
function loading(){return '<div style="text-align:center;padding:60px;color:var(--text3)">&#x23F3; Caricamento...</div>';}
function btn(cls,txt,hid){return '<button class="btn '+cls+'" data-click="'+hid+'">'+txt+'</button>';}
function mClose(hid){return '<button class="modal-close" data-click="'+hid+'">&#x2715;</button>';}

// ── LOGIN ──────────────────────────────────────
window.doLogin=function(){
  var u=document.getElementById('lu'),p=document.getElementById('lp');
  var err=document.getElementById('lerr'),b=document.getElementById('lbtn');
  if(!u||!p)return;
  var uv=u.value.trim(),pv=p.value;
  if(!uv||!pv){err.textContent='Inserisci username e password.';err.style.display='block';return;}
  err.style.display='none';b.disabled=true;b.textContent='Accesso...';
  sb('utenti?username=eq.'+encodeURIComponent(uv)+'&password=eq.'+encodeURIComponent(pv)+'&attivo=eq.true')
    .then(function(rows){
      if(rows&&rows.length){set('user',rows[0]);set('tab','dashboard');loadDash();}
      else{err.textContent='Credenziali errate o account non attivo.';err.style.display='block';b.disabled=false;b.textContent='Accedi';}
    }).catch(function(){err.textContent='Errore di connessione.';err.style.display='block';b.disabled=false;b.textContent='Accedi';});
};

function renderLogin(){
  return '<div class="login-page">'
    +'<div style="position:absolute;width:700px;height:700px;top:-250px;right:-200px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.06),transparent 70%);pointer-events:none"></div>'
    +'<div style="position:absolute;width:500px;height:500px;bottom:-150px;left:-150px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,.06),transparent 70%);pointer-events:none"></div>'
    +'<div class="login-card anim">'
      +'<div style="margin-bottom:32px;text-align:center">'
        +'<div style="width:64px;height:64px;border-radius:18px;background:var(--grad);display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:16px;box-shadow:0 8px 28px rgba(245,158,11,.35)">&#x1F3C6;</div>'
        +'<div style="font-size:1.5rem;font-weight:800">SalesWorld Academy</div>'
        +'<div style="font-size:.83rem;color:var(--text2);margin-top:5px">Accedi alla tua area riservata</div>'
      +'</div>'
      +label('Username','<input id="lu" type="text" class="fi" placeholder="Il tuo username" autocomplete="username" onkeydown="if(event.key===\'Enter\')window.doLogin()">')
      +label('Password','<input id="lp" type="password" class="fi" placeholder="La tua password" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')window.doLogin()">')
      +'<div id="lerr" style="display:none;color:#EF4444;font-size:.82rem;margin-bottom:14px;padding:9px 13px;background:rgba(239,68,68,.10);border-radius:9px;border:1px solid rgba(239,68,68,.2)"></div>'
      +'<button id="lbtn" onclick="window.doLogin()" class="btn btn-g" style="width:100%;padding:13px;font-size:.93rem;margin-top:4px">&#x1F680; Accedi</button>'
      +'<div style="text-align:center;margin-top:22px;font-size:.74rem;color:var(--text3)">Non hai accesso? Contatta il manager.</div>'
    +'</div>'
  +'</div>';
}

// ── SIDEBAR ────────────────────────────────────
function renderSidebar(){
  var user=S('user',{}),tab=S('tab','dashboard'),isAdmin=user.ruolo==='admin';
  var nav=isAdmin
    ?[['dashboard','&#x1F4CA;','Dashboard'],['studenti','&#x1F465;','Studenti'],['istruttori','&#x1F393;','Istruttori'],['corsi','&#x1F4DA;','Corsi'],['community','&#x1F4AC;','Community'],['risorse','&#x1F4C1;','Risorse'],['live','&#x1F3A5;','Live &amp; Replay']]

  var rc=isAdmin?'var(--gold)':user.ruolo==='istruttore'?'var(--purple)':'var(--cyan)';
  var rl=isAdmin?'Manager':user.ruolo==='istruttore'?'Istruttore':'Studente';
  var navH=nav.map(function(n){
    var h=fn(function(){set('tab',n[0]);set('corso_aperto',null);});
    return '<button class="sb-btn'+(tab===n[0]?' active':'')+'" data-click="'+h+'"><div class="sb-ico">'+n[1]+'</div>'+n[2]+'</button>';
  }).join('');
  var lh=fn(function(){_s={};draw();});

    +'<div class="sb-nav">'+navH+'</div>'
    +'<div class="sb-user">'+av(user.nome,34)+'<div style="flex:1;min-width:0"><div style="font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(user.nome)+'</div><div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:'+rc+';margin-top:1px">'+rl+'</div></div>'
    +'<button class="sb-logout" data-click="'+lh+'" title="Esci">&#x23FB;</button>'
    +'</div></div>';
}

function renderTopbar(){
  var user=S('user',{}),tab=S('tab','dashboard');
  var tabs={dashboard:'Dashboard',corsi:'Corsi',studenti:'Studenti',istruttori:'Istruttori',community:'Community',risorse:'Risorse',live:'Live & Replay'};

  +'</div>';

// ── DASHBOARD ──────────────────────────────────
function loadDash(){
  var user=S('user',{}),isAdmin=user.ruolo==='admin';
  if(isAdmin){sb('utenti?ruolo=eq.studente').then(function(r){set('d_s',r.length);});sb('utenti?ruolo=eq.istruttore').then(function(r){set('d_i',r.length);});}

}

  var s=S('d_s','…'),i2=S('d_i','…'),c=S('d_c','…'),l=S('d_l','…'),p=S('d_p','…'),comp=S('d_comp',0),live=S('d_live',[]);

  if(!isAdmin)kpis.push({ico:'&#x2705;',bg:'rgba(16,185,129,.1)',v:comp,l:'Completate',c:'var(--green)'});
  var kpiH='<div class="g4" style="margin-bottom:24px">'+kpis.map(function(k){
    return '<div class="card" style="padding:20px 22px"><div style="width:40px;height:40px;border-radius:11px;background:'+k.bg+';display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:13px">'+k.ico+'</div><div style="font-size:2rem;font-weight:800;color:'+k.c+'">'+k.v+'</div><div style="font-size:.72rem;color:var(--text2);margin-top:3px">'+k.l+'</div></div>';
  }).join('')+'</div>';

  var futH=future.map(function(s){
    var dt=s.data_ora?new Date(s.data_ora):null;
    var eH=isAdmin?fn(function(){set('lv_ec',s);set('lv_m',true);}):null;
    var dH=isAdmin?fn(function(){if(!confirm('Eliminare?'))return;sb('live_sessioni?id=eq.'+s.id,{method:'DELETE'}).then(loadLV);}):null;
    return '<div class="card" style="margin-bottom:10px;display:flex;align-items:center;gap:18px">'
      +'<div style="width:58px;height:58px;border-radius:14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">'
      +(dt?'<div style="font-size:1.3rem;font-weight:800;color:var(--red);line-height:1">'+dt.getDate()+'</div><div style="font-size:.6rem;text-transform:uppercase;color:var(--text3)">'+dt.toLocaleDateString('it-IT',{month:'short'})+'</div>':'<span style="font-size:1.5rem">&#x1F4C5;</span>')
      +'</div>'
      +'<div style="flex:1"><div style="font-weight:700;margin-bottom:3px">'+esc(s.titolo)+'</div><div style="font-size:.8rem;color:var(--text2)">'+esc(s.istruttore_nome||'')+(dt?' · '+dt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):'')+' · '+(s.durata_minuti||60)+' min</div></div>'
      +'<div style="display:flex;gap:8px">'+(s.url_join?'<a href="'+esc(s.url_join)+'" target="_blank" class="btn btn-r btn-sm" style="text-decoration:none">&#x1F534; Partecipa</a>':'')+(isAdmin?'<button class="btn btn-gh btn-sm" data-click="'+eH+'">&#x270F;</button><button class="btn btn-r btn-sm" data-click="'+dH+'">&#x1F5D1;</button>':'')+'</div>'
    +'</div>';
  }).join('');
  var repH=replay.map(function(s){
    var vid=ytId(s.url_replay);
    var eH=isAdmin?fn(function(){set('lv_ec',s);set('lv_m',true);}):null;
    var dH=isAdmin?fn(function(){if(!confirm('Eliminare?'))return;sb('live_sessioni?id=eq.'+s.id,{method:'DELETE'}).then(loadLV);}):null;
    return '<div class="card">'+(vid?'<div class="vw" style="margin-bottom:14px"><iframe src="https://www.youtube.com/embed/'+vid+'" allowfullscreen></iframe></div>':'<div style="height:120px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin-bottom:14px">&#x1F3AC;</div>')+'<div style="font-weight:700;margin-bottom:4px">'+esc(s.titolo)+'</div><div style="font-size:.78rem;color:var(--text2);margin-bottom:12px">'+esc(s.istruttore_nome||'')+' · '+fmtD(s.data_ora)+'</div>'+(isAdmin?'<div style="display:flex;gap:6px"><button class="btn btn-gh btn-sm" data-click="'+eH+'">&#x270F;</button><button class="btn btn-r btn-sm" data-click="'+dH+'">&#x1F5D1;</button></div>':'')+'</div>';
  }).join('');
  var modal='';
  if(S('lv_m',false)){
    var ec=S('lv_ec',null);
    var sH=fn(function(){
      var t=rv('lf_t');if(!t)return;
      var data={titolo:t,descrizione:rv('lf_d'),data_ora:rv('lf_dt'),url_join:rv('lf_j'),url_replay:rv('lf_r'),istruttore_nome:rv('lf_i'),durata_minuti:parseInt(rv('lf_du'))||60};
      var p=ec?sb('live_sessioni?id=eq.'+ec.id,{method:'PATCH',body:JSON.stringify(data)}):sb('live_sessioni',{method:'POST',body:JSON.stringify(data)});
      p.then(function(){set('lv_m',false);set('lv_ec',null);loadLV();});
    });
    var cH2=fn(function(){set('lv_m',false);set('lv_ec',null);});
    modal='<div class="modal-ov" onclick="if(event.target===this){window._s.lv_m=false;draw();}">'
      +'<div class="modal-box anim">'+mClose(cH2)
      +'<div class="modal-title">&#x1F3A5; '+(ec?'Modifica sessione':'Nuova sessione live')+'</div>'
      +label('Titolo *',inp('lf_t','Titolo della sessione','text',ec?ec.titolo:''))
      +'<div class="g2f">'+label('Data e ora',inp('lf_dt','','datetime-local',ec?ec.data_ora||'':''))+label('Durata (min)',inp('lf_du','','number',String(ec?ec.durata_minuti||60:60)))+'</div>'
      +label('Istruttore',inp('lf_i','','text',ec?ec.istruttore_nome||user.nome:user.nome))
      +label('Link Zoom/Meet',inp('lf_j','https://zoom.us/...','text',ec?ec.url_join||'':''))
      +label('Link Replay YouTube',inp('lf_r','https://youtube.com/watch?v=...','text',ec?ec.url_replay||'':''))
      +label('Descrizione',ta('lf_d','Descrizione',ec?ec.descrizione||'':''))
      +'<button class="btn btn-g" style="width:100%;margin-top:8px;padding:12px" data-click="'+sH+'">&#x1F4BE; Salva</button>'
      +'</div></div>';
  }
  var nH=fn(function(){set('lv_ec',null);set('lv_m',true);});
  return '<div class="anim">'
    +'<div class="page-hdr"><div class="fb"><div><h1>&#x1F3A5; Live &amp; Replay</h1><p>Sessioni dal vivo e registrazioni</p></div>'+(isAdmin?'<button class="btn btn-g" data-click="'+nH+'">+ Nuova sessione</button>':'')+'</div></div>'
    +(future.length>0?'<div style="margin-bottom:28px"><div style="font-weight:700;font-size:1rem;margin-bottom:14px;color:var(--red)">&#x1F534; Prossime live</div>'+futH+'</div>':'')
    +(replay.length>0?'<div><div style="font-weight:700;font-size:1rem;margin-bottom:14px">&#x1F3AC; Replay</div><div class="g3">'+repH+'</div></div>':'')
    +(lista.length===0?'<div style="text-align:center;color:var(--text3);padding:50px">Nessuna sessione programmata.</div>':'')
    +modal
  +'</div>';
}

// ── RENDER ─────────────────────────────────────
function render(){
  _h={};_hc=0;
  var user=S('user',null);
  if(!user)return renderLogin();
  var tab=S('tab','dashboard'),isAdmin=user.ruolo==='admin';
  var content='';
  if(tab==='dashboard')content=renderDash();
  else if(tab==='corsi')content=isAdmin?renderAdminCorsi():renderCorsi();
  else if(tab==='studenti')content=renderUtenti('studente');
  else if(tab==='istruttori')content=renderUtenti('istruttore');
  else if(tab==='community')content=renderCommunity();
  else if(tab==='risorse')content=renderRisorse();
  else if(tab==='live')content=renderLive();
  return '<div class="layout">'+renderSidebar()+'<div class="main-area">'+renderTopbar()+'<div class="content">'+content+'</div></div></div>';
}

window._s=_s;
window.draw=draw;
_root=document.getElementById('app');
draw();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SalesWorld Academy</title>
<style>
:root{
  --bg:#07070f;--bg2:#0d0d1a;--bg3:#131326;--card:#0f0f1e;
  --gold:#F59E0B;--cyan:#06B6D4;--green:#10B981;--red:#EF4444;--purple:#8B5CF6;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#475569;
  --border:rgba(255,255,255,0.07);--border-g:rgba(245,158,11,0.2);
  --grad:linear-gradient(135deg,#F59E0B,#D97706);
  --grad-cool:linear-gradient(135deg,#06B6D4,#8B5CF6);
  --sb:250px;--topH:58px;--botH:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(245,158,11,.2);border-radius:3px}

/* ── LAYOUT ── */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:var(--sb);background:linear-gradient(180deg,#080815 0%,#0d0d1a 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.main-wrap{margin-left:var(--sb);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:var(--topH);background:rgba(7,7,15,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0}
.page{padding:20px;flex:1;padding-bottom:calc(var(--botH) + 16px)}
/* bottom nav - mobile only */
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--botH);background:rgba(10,10,22,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100;padding:0 4px;align-items:center;justify-content:space-around}
.bot-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:12px;transition:all .2s;font-family:inherit;flex:1;min-width:0}
.bot-btn.active{color:var(--gold)}
.bot-btn .bot-ico{font-size:1.3rem;line-height:1;transition:transform .2s}
.bot-btn.active .bot-ico{transform:scale(1.15)}
.bot-btn .bot-lbl{font-size:.58rem;font-weight:600;letter-spacing:.03em;white-space:nowrap}
/* mobile dot indicator */
.bot-btn.active::after{content:'';position:absolute;bottom:6px;width:4px;height:4px;background:var(--gold);border-radius:50%;display:none}

/* ── SIDEBAR ── */
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo-ico{width:40px;height:40px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin-bottom:10px;box-shadow:0 4px 16px rgba(245,158,11,.3)}
.sb-logo-name{font-size:1.05rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-logo-sub{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.15em;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-sect{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:10px 10px 5px}
.sb-item{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:none;background:none;color:var(--text3);font-size:.84rem;font-weight:500;cursor:pointer;text-align:left;font-family:inherit;transition:all .18s;margin-bottom:2px;position:relative}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--text2)}
.sb-item.active{background:rgba(245,158,11,.12);color:var(--gold);font-weight:600}
.sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--gold);border-radius:0 3px 3px 0}
.sb-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;background:rgba(255,255,255,.04);flex-shrink:0;transition:background .18s}
.sb-item.active .sb-ico{background:rgba(245,158,11,.18)}
.sb-foot{padding:12px 8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03)}
.sb-logout{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px 8px;border-radius:8px;font-family:inherit;transition:all .18s;margin-left:auto;font-size:.8rem}
.sb-logout:hover{color:var(--red);background:rgba(239,68,68,.1)}

/* ── TOPBAR ── */
.tb-left{display:flex;align-items:center;gap:10px}
.tb-back{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:9px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .18s}
.tb-back:hover{background:rgba(255,255,255,.1);color:var(--text)}
.tb-title{font-size:.9rem;font-weight:700;color:var(--text2)}
.tb-right{display:flex;align-items:center;gap:8px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-pad{padding:18px}
.card-tappable{cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;active-scale:.97}
.card-tappable:active{transform:scale(.98)}
.card-tappable:hover{border-color:var(--border-g);box-shadow:0 8px 30px rgba(0,0,0,.4)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;cursor:pointer;font-weight:700;font-size:.875rem;font-family:inherit;transition:all .18s;white-space:nowrap;letter-spacing:.01em}
.btn:active{transform:scale(.96)}
.btn-gold{background:var(--grad);color:#000;padding:12px 20px;box-shadow:0 3px 14px rgba(245,158,11,.25)}
.btn-gold:hover{box-shadow:0 6px 22px rgba(245,158,11,.4);transform:translateY(-1px)}
.btn-gold:active{transform:scale(.97)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--text2);padding:11px 16px;border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.12);color:var(--text)}
.btn-red{background:rgba(239,68,68,.12);color:#EF4444;padding:9px 14px;border:1px solid rgba(239,68,68,.22)}
.btn-red:hover{background:rgba(239,68,68,.2)}
.btn-cyan{background:rgba(6,182,212,.12);color:var(--cyan);padding:9px 14px;border:1px solid rgba(6,182,212,.22)}
.btn-sm{padding:6px 12px!important;font-size:.75rem!important;border-radius:8px!important}
.btn-xs{padding:4px 9px!important;font-size:.7rem!important;border-radius:7px!important}
.btn-full{width:100%;padding:13px!important}

/* ── FORM ── */
.field{margin-bottom:14px}
.field-lbl{display:block;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.fi{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:11px;font-size:.9rem;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none}
.fi:focus{border-color:rgba(245,158,11,.5);background:rgba(255,255,255,.07)}
textarea.fi{resize:vertical;min-height:80px;display:block;line-height:1.6}
select.fi option{background:var(--bg2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── BADGE ── */
.badge{display:inline-flex;padding:3px 9px;border-radius:50px;font-size:.68rem;font-weight:700;letter-spacing:.02em}
.b-gold{background:rgba(245,158,11,.15);color:var(--gold)}
.b-cyan{background:rgba(6,182,212,.15);color:var(--cyan)}
.b-green{background:rgba(16,185,129,.15);color:var(--green)}
.b-red{background:rgba(239,68,68,.15);color:var(--red)}
.b-purple{background:rgba(139,92,246,.15);color:var(--purple)}
.b-gray{background:rgba(255,255,255,.09);color:var(--text2)}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06;background:var(--kpi-c,#F59E0B)}
.kpi-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:12px;background:var(--kpi-bg,rgba(245,158,11,.1))}
.kpi-val{font-size:1.9rem;font-weight:800;line-height:1;color:var(--kpi-c,var(--gold))}
.kpi-lbl{font-size:.72rem;color:var(--text2);margin-top:4px;font-weight:500}

/* ── PROGRESS BAR ── */
.pbar{height:5px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;background:var(--grad);transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;min-width:500px}
.tbl th{text-align:left;padding:10px 14px;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.tbl td{padding:13px 14px;font-size:.875rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02)}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
@media(min-width:600px){.modal-ov{align-items:center}}
.modal-box{background:linear-gradient(160deg,#0f0f1e,#0a0a18);border:1px solid var(--border-g);border-radius:24px 24px 0 0;padding:28px 24px 36px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;position:relative;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@media(min-width:600px){.modal-box{border-radius:24px;padding:32px;max-height:90vh}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:1.1rem;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text3);width:32px;height:32px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .18s;line-height:1}
.modal-close:hover{background:rgba(239,68,68,.18);color:var(--red);border-color:rgba(239,68,68,.3)}

/* ── LOGIN ── */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;padding:20px}
.login-blob{position:absolute;border-radius:50%;pointer-events:none}
.login-card{position:relative;z-index:2;background:linear-gradient(160deg,#0f0f1e,#0a0a18);border:1px solid var(--border-g);border-radius:24px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,.7)}

/* ── COURSE VIEWER ── */
.vw{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:14px;background:#000}
.vw iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.lrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all .15s}
.lrow:hover{background:rgba(255,255,255,.04)}
.lrow.active{background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.18)}
.lck{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0}
.lck.done{background:var(--green);border-color:var(--green);color:#fff}

/* ── COMMUNITY ── */
.pact{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.82rem;padding:6px 10px;border-radius:8px;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.pact:hover{color:var(--gold);background:rgba(245,158,11,.08)}

/* ── MISC ── */
.ph{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.ph h1{font-size:1.35rem;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.ph p{font-size:.82rem;color:var(--text2);margin-top:3px}
.sep{border:none;border-top:1px solid var(--border);margin:16px 0}
.av{border-radius:50%;background:var(--grad);display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#000;flex-shrink:0}
.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:.875rem}
.section-title{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.anim{animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
.loading{animation:pulse 1.5s infinite}

/* ── CHIP ── */
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:6px 14px;border-radius:50px;font-size:.75rem;font-weight:600;border:1.5px solid var(--border);color:var(--text3);background:none;cursor:pointer;font-family:inherit;transition:all .18s}
.chip.active,.chip:hover{border-color:rgba(245,158,11,.4);color:var(--gold);background:rgba(245,158,11,.08)}

/* ── CORSO CARD ── */
.corso-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s}
.corso-card:active{transform:scale(.98)}
.corso-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.5);border-color:var(--border-g)}
.corso-banner{height:110px;display:flex;align-items:center;justify-content:center;font-size:3.2rem;position:relative}
.corso-body{padding:14px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .main-wrap{margin-left:0}
  .bot-nav{display:flex}
  .page{padding:16px;padding-bottom:calc(var(--botH) + 20px)}
  .kpi-grid{gap:10px}
  .kpi-val{font-size:1.7rem}
  .topbar{padding:0 14px}
  .ph h1{font-size:1.2rem}
}
@media(max-width:400px){
  .kpi-card{padding:14px}
  .kpi-val{font-size:1.5rem}
  .login-card{padding:28px 20px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
'use strict';

var SB='https://khcipjozfamdrhspaxjh.supabase.co';
var SK='sb_publishable_WhQ9J2Dphtxbgkk0vrTu3A_xV1lFLmZ';

function api(path,opts){
  opts=opts||{};
  return fetch(SB+'/rest/v1/'+path,{
    method:opts.method||'GET',
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'},
    body:opts.body
  }).then(function(r){return r.text();}).then(function(t){try{return t?JSON.parse(t):[]}catch(e){return [];}});
}

/* ── STATE ── */
var _s={},_root=null,_rq=false;
function g(k,d){return k in _s?_s[k]:d;}
function s(k,v){_s[k]=v;if(!_rq){_rq=true;requestAnimationFrame(function(){_rq=false;redraw();});}}
function redraw(){if(_root)_root.innerHTML=renderApp();}

/* ── EVENT DELEGATION ── */
var _h={},_n=0;
function h(fn){var id='h'+(++_n);_h[id]=fn;return id;}
['click','change'].forEach(function(ev){
  document.addEventListener(ev,function(e){
    var t=e.target;
    while(t&&t!==document){
      var k=t.dataset&&t.dataset[ev];
      if(k&&_h[k]){_h[k](e);return;}
      t=t.parentElement;
    }
  });
});

/* ── UTILS ── */
function esc(x){return String(x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ini(n){if(!n)return'?';return(n.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase()||'?').slice(0,2);}
function fD(ts){if(!ts)return'-';return new Date(ts).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});}
function fDT(ts){if(!ts)return'-';return new Date(ts).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function ago(ts){var d=(Date.now()-new Date(ts))/1000;if(d<60)return'ora';if(d<3600)return Math.floor(d/60)+'m fa';if(d<86400)return Math.floor(d/3600)+'h fa';return Math.floor(d/86400)+'gg fa';}
function yt(u){if(!u)return null;var m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&\n?#]+)/);return m?m[1]:null;}
function avEl(name,sz){sz=sz||36;var br=Math.round(sz*.28);return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;border-radius:'+br+'px;font-size:'+Math.round(sz*.22)+'px">'+ini(name)+'</div>';}
function rv(id){var el=document.getElementById(id);return el?el.value:'';}
function inp(id,ph,type,val){return '<input id="'+id+'" type="'+(type||'text')+'" class="fi" placeholder="'+esc(ph||'')+'" value="'+esc(val||'')+'" autocomplete="off">';}
function ta(id,ph,val){return '<textarea id="'+id+'" class="fi" placeholder="'+esc(ph||'')+'">'+esc(val||'')+'</textarea>';}
function fsel(id,opts,val){var o=opts.map(function(x){return'<option value="'+esc(x[0])+'"'+(val===x[0]?' selected':'')+'>'+esc(x[1])+'</option>';}).join('');return'<select id="'+id+'" class="fi" style="cursor:pointer">'+o+'</select>';}
function field(lbl,inp){return'<div class="field"><label class="field-lbl">'+esc(lbl)+'</label>'+inp+'</div>';}
function mClose(fid){return'<button class="modal-close" data-click="'+fid+'">&#x2715;</button>';}
function loading(){return'<div class="empty loading">&#x23F3; Caricamento...</div>';}
function chip(label,val,cur,fid){return'<button class="chip'+(cur===val?' active':'')+'" data-click="'+fid+'">'+label+'</button>';}
function kpi(ico,val,lbl,col,bg){return'<div class="kpi-card" style="--kpi-c:'+col+';--kpi-bg:'+bg+'"><div class="kpi-ico">'+ico+'</div><div class="kpi-val">'+val+'</div><div class="kpi-lbl">'+lbl+'</div></div>';}

/* ── NAVIGATION HISTORY ── */
var _hist=[];
function push(tab,extra){_hist.push({tab:g('tab','dashboard'),extra:extra||{}});s('tab',tab);}
function back(){if(_hist.length){var prev=_hist.pop();s('tab',prev.tab);if(prev.extra.corso_aperto!==undefined)s('corso_aperto',prev.extra.corso_aperto||null);}else{s('tab','dashboard');}}

/* ── LOGIN ── */
window.doLogin=function(){
  var u=document.getElementById('lu'),p=document.getElementById('lp');
  var err=document.getElementById('lerr'),btn=document.getElementById('lbtn');
  if(!u||!p)return;
  var uv=u.value.trim(),pv=p.value;
  if(!uv||!pv){showErr('Inserisci username e password.');return;}
  err.style.display='none';btn.disabled=true;btn.textContent='Accesso in corso...';
  api('utenti?username=eq.'+encodeURIComponent(uv)+'&password=eq.'+encodeURIComponent(pv)+'&attivo=eq.true')
    .then(function(r){
      if(r&&r.length){_hist=[];s('user',r[0]);s('tab','dashboard');loadDash();}
      else{showErr('Credenziali errate o account disattivato.');btn.disabled=false;btn.textContent='Accedi';}
    }).catch(function(){showErr('Errore di connessione.');btn.disabled=false;btn.textContent='Accedi';});
  function showErr(m){err.textContent=m;err.style.display='block';}
};

function renderLogin(){
  return '<div class="login-bg">'
    +'<div class="login-blob" style="width:600px;height:600px;top:-200px;right:-200px;background:radial-gradient(circle,rgba(245,158,11,.07),transparent 70%)"></div>'
    +'<div class="login-blob" style="width:400px;height:400px;bottom:-100px;left:-100px;background:radial-gradient(circle,rgba(6,182,212,.06),transparent 70%)"></div>'
    +'<div class="login-card anim">'
      +'<div style="text-align:center;margin-bottom:28px">'

function renderCV(corso){
  var mods=g('cv_m',[]),lez=g('cv_l',[]),prog=g('cv_p',[]),latt=g('cv_la',null),mopen=g('cv_mo',null);
  function done(lid){return prog.some(function(p){return p.lezione_id===lid&&p.completata;});}
  var tot=lez.length,comp=lez.filter(function(l){return done(l.id);}).length,pct=tot?Math.round(comp/tot*100):0;
  var vid=latt?yt(latt.video_url):null;
  var backH=h(function(){s('corso_aperto',null);});
  function markH(lid){return h(function(){
    var user=g('user',{}),pr=g('cv_p',[]),ex=pr.find(function(p){return p.lezione_id===lid;});
    var pm=ex?api('progressi?id=eq.'+ex.id,{method:'PATCH',body:JSON.stringify({completata:true})}):api('progressi',{method:'POST',body:JSON.stringify({studente_id:user.id,lezione_id:lid,completata:true})});
    pm.then(function(){api('progressi?studente_id=eq.'+user.id).then(function(p){s('cv_p',p);});});
  });}
  var modsH=mods.map(function(m){
    var lm=lez.filter(function(l){return l.modulo_id===m.id;}),cm=lm.filter(function(l){return done(l.id);}).length;
    var tH=h(function(){s('cv_mo',mopen===m.id?null:m.id);});
    var lH='';
    if(mopen===m.id){lH=lm.map(function(l){
      var selH=h(function(){s('cv_la',l);});
      return'<div class="lrow'+(latt&&latt.id===l.id?' active':'')+'" data-click="'+selH+'">'
        +'<div class="lck'+(done(l.id)?' done':'')+'">'+(done(l.id)?'&#x2713;':'')+'</div>'
        +'<div style="flex:1;min-width:0"><div style="font-size:.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(l.titolo)+'</div>'
        +(l.durata_minuti>0?'<div style="font-size:.65rem;color:var(--text3)">'+l.durata_minuti+' min</div>':'')+'</div>'
        +(l.video_url?'<span style="opacity:.4;font-size:.85rem">&#x25B6;</span>':'')
      +'</div>';
    }).join('');}
    return'<div style="margin-bottom:4px">'
      +'<button data-click="'+tH+'" style="width:100%;background:'+(mopen===m.id?'rgba(245,158,11,.08)':'rgba(255,255,255,.03)')+';border:1px solid '+(mopen===m.id?'rgba(245,158,11,.2)':'transparent')+';border-radius:10px;padding:10px 13px;color:var(--text);font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:.84rem;font-weight:600">'
      +'<span>'+esc(m.titolo)+'</span><span style="font-size:.65rem;color:var(--text3)">'+cm+'/'+lm.length+' '+(mopen===m.id?'&#x25B2;':'&#x25BC;')+'</span></button>'
      +'<div style="padding-left:6px">'+lH+'</div>'
    +'</div>';
  }).join('');
  var doneBtn=latt?(done(latt.id)?'<span style="color:var(--green);font-weight:700;font-size:.85rem">&#x2705; Completata</span>':'<button class="btn btn-sm" style="background:var(--grad);color:#000;font-size:.75rem" data-click="'+markH(latt.id)+'">&#x2705; Segna completata</button>'):'';
  return'<div class="anim">'
    +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">'
    +'<button class="btn btn-ghost btn-sm" data-click="'+backH+'">&#x2190; Corsi</button>'
    +'<div style="font-weight:700;font-size:.95rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(corso.emoji||'&#x1F4DA;')+' '+esc(corso.titolo)+'</div>'
    +'<span class="badge b-gold">'+pct+'%</span>'
    +'</div>'
    +'<div class="pbar" style="margin-bottom:16px"><div class="pfill" style="width:'+pct+'%"></div></div>'
    // On mobile: stacked. On desktop: side by side
    +'<div style="display:grid;grid-template-columns:1fr;gap:14px">'
      +(latt?'<div class="card card-pad">'
        +(vid?'<div class="vw" style="margin-bottom:16px"><iframe src="https://www.youtube.com/embed/'+vid+'?rel=0" allowfullscreen></iframe></div>':'<div style="height:150px;background:var(--bg2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:3rem;margin-bottom:16px">&#x1F3AC;</div>')
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px"><div style="flex:1;min-width:0"><div style="font-weight:800;font-size:1rem">'+esc(latt.titolo)+'</div>'+(latt.durata_minuti>0?'<div style="font-size:.75rem;color:var(--text2);margin-top:3px">&#x23F1; '+latt.durata_minuti+' min</div>':'')+'</div>'+doneBtn+'</div>'
        +(latt.contenuto?'<hr class="sep"><div style="font-size:.875rem;line-height:1.85;color:var(--text2)">'+esc(latt.contenuto)+'</div>':'')
      +'</div>':'<div class="card card-pad" style="text-align:center;color:var(--text3)">Seleziona una lezione dal menu</div>')
      +'<div class="card" style="padding:12px">'+modsH+(mods.length===0?'<div class="empty" style="padding:20px">Nessun contenuto.</div>':'')+'</div>'
    +'</div>'

/* ── UTENTI ── */
function loadU(r){api('utenti?ruolo=eq.'+r+'&order=created_at.desc').then(function(d){s('ut_'+r,d);});}

function renderUtenti(ruolo){
  var lista=g('ut_'+ruolo,null);if(lista===null){loadU(ruolo);return loading();}
  var lbl=ruolo==='istruttore'?'Istruttori':'Studenti';
  var src=g('uts_'+ruolo,'');
  var srcH=h(function(e){s('uts_'+ruolo,e.target.value);});
  var nH=h(function(){s('ute_'+ruolo,null);s('utm_'+ruolo,true);});
  var filt=lista.filter(function(x){return(x.nome||'').toLowerCase().indexOf(src.toLowerCase())>=0||(x.username||'').toLowerCase().indexOf(src.toLowerCase())>=0;});
  var rows=filt.map(function(x){
    var eH=h(function(){s('ute_'+ruolo,x);s('utm_'+ruolo,true);});
    var tH=h(function(){api('utenti?id=eq.'+x.id,{method:'PATCH',body:JSON.stringify({attivo:!x.attivo})}).then(function(){loadU(ruolo);});});
    var dH=h(function(){if(!confirm('Eliminare?'))return;api('utenti?id=eq.'+x.id,{method:'DELETE'}).then(function(){loadU(ruolo);});});
    return'<tr><td><div style="display:flex;align-items:center;gap:9px">'+avEl(x.nome,30)+'<div style="font-weight:600;font-size:.85rem">'+esc(x.nome)+'</div></div></td>'
      +'<td><code style="background:var(--bg3);padding:2px 8px;border-radius:6px;font-size:.78rem">'+esc(x.username)+'</code></td>'
      +'<td style="color:var(--text2);font-size:.8rem;white-space:nowrap">'+esc(x.email||'-')+'</td>'
      +'<td><span class="badge '+(x.attivo?'b-green':'b-red')+'">'+(x.attivo?'Attivo':'Off')+'</span></td>'
      +'<td style="color:var(--text3);font-size:.75rem;white-space:nowrap">'+fD(x.created_at)+'</td>'
      +'<td><div style="display:flex;gap:5px"><button class="btn btn-ghost btn-xs" data-click="'+eH+'">&#x270F;</button><button class="btn '+(x.attivo?'btn-red':'btn-cyan')+' btn-xs" data-click="'+tH+'">'+(x.attivo?'&#x1F512;':'&#x1F513;')+'</button><button class="btn btn-red btn-xs" data-click="'+dH+'">&#x1F5D1;</button></div></td></tr>';
  }).join('');
  var modalH='';
  window._utmClose=function(){s('utm_'+ruolo,false);s('ute_'+ruolo,null);};
  if(g('utm_'+ruolo,false)){
    var ec=g('ute_'+ruolo,null);
    var svH=h(function(){
      var nome=rv('ufn'),user=rv('ufu'),pass=rv('ufp');if(!nome||!user||!pass)return;
      var d={nome:nome,username:user,password:pass,email:rv('ufe'),attivo:rv('ufa')==='si'};
      var p=ec?api('utenti?id=eq.'+ec.id,{method:'PATCH',body:JSON.stringify(d)}):api('utenti',{method:'POST',body:JSON.stringify(Object.assign({},d,{ruolo:ruolo}))});
      p.then(function(){window._utmClose();loadU(ruolo);});
    });
    var clH=h(function(){window._utmClose();});
    modalH='<div class="modal-ov" onclick="if(event.target===this)window._utmClose()"><div class="modal-box anim"><div class="modal-handle"></div>'+mClose(clH)
      +'<div class="modal-title">&#x1F464; '+(ec?'Modifica':'Nuovo')+' '+lbl.slice(0,-1)+'</div>'
      +'<div class="g2">'+field('Nome *',inp('ufn','Mario Rossi','text',ec?ec.nome||'':''))+field('Email',inp('ufe','email@...','email',ec?ec.email||'':''))+'</div>'
      +'<div class="g2">'+field('Username *',inp('ufu','username','text',ec?ec.username||'':''))+field('Password *',inp('ufp','password','text',ec?ec.password||'':''))+'</div>'
      +field('Stato',fsel('ufa',[['si','&#x2705; Attivo'],['no','&#x1F512; Disattivo']],ec?(ec.attivo?'si':'no'):'si'))
      +'<button class="btn btn-gold btn-full" style="margin-top:6px" data-click="'+svH+'">&#x1F4BE; Salva</button>'
    +'</div></div>';
  }
  return'<div class="anim">'
    +'<div class="ph"><div><h1>'+esc(lbl)+'</h1><p>Gestisci gli '+esc(lbl.toLowerCase())+' della Academy</p></div>'
    +'<div style="display:flex;gap:8px"><input class="fi" style="width:150px;padding:8px 12px;font-size:.82rem" placeholder="Cerca..." value="'+esc(src)+'" data-change="'+srcH+'"><button class="btn btn-gold btn-sm" data-click="'+nH+'">+ Aggiungi</button></div></div>'
    +'<div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Nome</th><th>Username</th><th>Email</th><th>Stato</th><th>Iscritto</th><th>Azioni</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +(filt.length===0?'<div class="empty">Nessun utente trovato.</div>':'')+'</div>'
    +modalH
  +'</div>';
}

function loadCM(){api('community_posts?order=pinnato.desc,created_at.desc').then(function(r){s('cm_p',r);});}

function renderCommunity(){
  var user=g('user',{});
  var posts=g('cm_p',null);if(posts===null){loadCM();return loading();}
  var filt=g('cm_f','tutti'),open=g('cm_o',{}),comm=g('cm_c',{}),isA=user.ruolo==='admin';
  var catLbl={tutti:'Tutti',generale:'Generale',domande:'Domande',successi:'Successi',risorse:'Risorse'};
  var catCls={generale:'b-gray',domande:'b-cyan',successi:'b-gold',risorse:'b-purple'};
  var cats=['tutti','generale','domande','successi','risorse'];
  var pubH=h(function(){
    var t=document.getElementById('cmt'),c=document.getElementById('cmc');
    if(!t||!t.value.trim())return;
    api('community_posts',{method:'POST',body:JSON.stringify({autore_id:user.id,autore_nome:user.nome,autore_ruolo:user.ruolo,contenuto:t.value,categoria:c?c.value:'generale',like_count:0})}).then(function(){loadCM();});
  });
  var filtChips=cats.map(function(c){var fid=h(function(){s('cm_f',c);});return chip(catLbl[c],c,filt,fid);}).join('');
  var filtered=filt==='tutti'?posts:posts.filter(function(p){return p.categoria===filt;});
  var postsH=filtered.map(function(post){
    var lH=h(function(){api('community_posts?id=eq.'+post.id,{method:'PATCH',body:JSON.stringify({like_count:(post.like_count||0)+1})}).then(loadCM);});
    var pinH=isA?h(function(){api('community_posts?id=eq.'+post.id,{method:'PATCH',body:JSON.stringify({pinnato:!post.pinnato})}).then(loadCM);}):null;
    var dH=isA?h(function(){if(!confirm('Eliminare?'))return;api('community_posts?id=eq.'+post.id,{method:'DELETE'}).then(loadCM);}):null;
    var togH=h(function(){
      var cur=g('cm_o',{}),nxt=!cur[post.id];
      s('cm_o',Object.assign({},cur,{[post.id]:nxt}));
      if(nxt&&!g('cm_c',{})[post.id])api('commenti?post_id=eq.'+post.id+'&order=created_at.asc').then(function(r){var c=g('cm_c',{});s('cm_c',Object.assign({},c,{[post.id]:r}));});
    });
    var pCH=h(function(){
      var t=document.getElementById('nc_'+post.id);
      if(!t||!t.value.trim())return;
      api('commenti',{method:'POST',body:JSON.stringify({post_id:post.id,autore_id:user.id,autore_nome:user.nome,contenuto:t.value})}).then(function(){
        t.value='';
        api('commenti?post_id=eq.'+post.id+'&order=created_at.asc').then(function(r){var c=g('cm_c',{});s('cm_c',Object.assign({},c,{[post.id]:r}));});
      });
    });
    var commH='';
    if(open[post.id]){
      commH='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">'
        +(comm[post.id]||[]).map(function(c){return'<div style="display:flex;gap:9px;margin-bottom:8px">'+avEl(c.autore_nome,28)+'<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:8px 12px;flex:1"><div style="font-size:.68rem;font-weight:700;color:var(--text2);margin-bottom:3px">'+esc(c.autore_nome)+'</div><div style="font-size:.855rem;line-height:1.6">'+esc(c.contenuto)+'</div></div></div>';}).join('')
        +'<div style="display:flex;gap:8px;margin-top:8px"><input id="nc_'+post.id+'" class="fi" style="flex:1;padding:9px 12px;font-size:.85rem" placeholder="Scrivi un commento..."><button class="btn btn-gold btn-sm" data-click="'+pCH+'">&#x27A4;</button></div>'
      +'</div>';
    }
    return'<div class="card card-pad" style="margin-bottom:12px;border-color:'+(post.pinnato?'var(--border-g)':'var(--border)')+';">'
      +(post.pinnato?'<div style="font-size:.68rem;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px">&#x1F4CC; IN EVIDENZA</div>':'')
      +'<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:12px">'+avEl(post.autore_nome,36)
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+esc(post.autore_nome)
        +(post.autore_ruolo==='admin'?'<span class="badge b-gold" style="font-size:.62rem">Manager</span>':'')
        +(post.autore_ruolo==='istruttore'?'<span class="badge b-purple" style="font-size:.62rem">Istruttore</span>':'')+'</div>'
        +'<div style="font-size:.7rem;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px">'+ago(post.created_at)+' <span class="badge '+(catCls[post.categoria]||'b-gray')+'" style="font-size:.62rem">'+(catLbl[post.categoria]||post.categoria)+'</span></div>'
      +'</div>'
      +(isA?'<div style="display:flex;gap:5px"><button class="btn btn-ghost btn-xs" data-click="'+pinH+'">'+(post.pinnato?'&#x1F4CC;':'&#x1F4CD;')+'</button><button class="btn btn-red btn-xs" data-click="'+dH+'">&#x1F5D1;</button></div>':'')
      +'</div>'
      +'<p style="font-size:.9rem;line-height:1.75;color:var(--text)">'+esc(post.contenuto)+'</p>'
      +'<div style="display:flex;gap:4px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)"><button class="pact" data-click="'+lH+'">&#x2764; '+(post.like_count||0)+'</button><button class="pact" data-click="'+togH+'">&#x1F4AC; Commenti</button></div>'
      +commH
    +'</div>';
  }).join('');
  return'<div class="anim">'
    +'<div class="ph"><div><h1>&#x1F4AC; Community</h1><p>Condividi, fai domande, celebra i successi</p></div></div>'
    +'<div class="card card-pad" style="margin-bottom:14px">'
      +'<div style="font-weight:700;margin-bottom:10px;font-size:.88rem">&#x270D; Condividi qualcosa</div>'
      +'<textarea id="cmt" class="fi" placeholder="Un pensiero, una domanda, un successo..." style="margin-bottom:10px"></textarea>'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +'<select id="cmc" class="fi" style="flex:1;padding:9px 12px;font-size:.83rem;cursor:pointer"><option value="generale">Generale</option><option value="domande">Domande</option><option value="successi">Successi</option><option value="risorse">Risorse</option></select>'
        +'<button class="btn btn-gold btn-sm" data-click="'+pubH+'">Pubblica</button>'
      +'</div>'
    +'</div>'
    +'<div class="chip-row">'+filtChips+'</div>'
    +postsH+(filtered.length===0?'<div class="empty">Nessun post. Scrivi il primo! &#x1F680;</div>':'')
  +'</div>';
}

/* ── RISORSE ── */
function loadRS(){api('risorse?order=created_at.desc').then(function(r){s('rs_l',r);});}

function renderRisorse(){
  var user=g('user',{});
  var lista=g('rs_l',null);if(lista===null){loadRS();return loading();}
  var filt=g('rs_f','tutti'),canEdit=user.ruolo==='admin'||user.ruolo==='istruttore';
  var tipi=['tutti','pdf','template','checklist','video','altro'];
  var tIco={pdf:'&#x1F4C4;',template:'&#x1F4CB;',checklist:'&#x2705;',video:'&#x1F3AC;',altro:'&#x1F4E6;'};
  var tCls={pdf:'b-gold',template:'b-cyan',checklist:'b-green',video:'b-purple',altro:'b-gray'};
  var filtChips=tipi.map(function(t){var fid=h(function(){s('rs_f',t);});return chip((tIco[t]||'&#x1F4E6;')+' '+t.charAt(0).toUpperCase()+t.slice(1),t,filt,fid);}).join('');
  var filteredR=filt==='tutti'?lista:lista.filter(function(r){return r.tipo===filt;});
  var items=filteredR.map(function(r){
    var eH=canEdit?h(function(){s('rs_ec',r);s('rs_m',true);}):null;
    var dH=canEdit?h(function(){if(!confirm('Eliminare?'))return;api('risorse?id=eq.'+r.id,{method:'DELETE'}).then(loadRS);}):null;
    return'<div class="card card-tappable" style="padding:16px">'
      +'<div style="width:46px;height:46px;border-radius:12px;background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.15);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:14px">'+(tIco[r.tipo]||'&#x1F4E6;')+'</div>'
      +'<div style="font-weight:700;margin-bottom:5px;font-size:.92rem">'+esc(r.titolo)+'</div>'
      +'<div style="font-size:.78rem;color:var(--text2);margin-bottom:12px;line-height:1.6">'+esc((r.descrizione||'').slice(0,80))+((r.descrizione||'').length>80?'&#x2026;':'')+'</div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px"><span class="badge '+(tCls[r.tipo]||'b-gray')+'">'+esc(r.tipo)+'</span><span style="font-size:.68rem;color:var(--text3)">'+esc(r.autore_nome||'Academy')+'</span></div>'
      +'<div style="display:flex;gap:7px"><a href="'+esc(r.url)+'" target="_blank" class="btn btn-gold btn-sm" style="flex:1;text-decoration:none;justify-content:center">&#x2B07; Scarica</a>'
      +(canEdit?'<button class="btn btn-ghost btn-xs" data-click="'+eH+'">&#x270F;</button><button class="btn btn-red btn-xs" data-click="'+dH+'">&#x1F5D1;</button>':'')
      +'</div></div>';
  }).join('');
  window._rsClose=function(){s('rs_m',false);s('rs_ec',null);};
  var modal='';
  if(g('rs_m',false)){
    var ec=g('rs_ec',null);
    var svH=h(function(){
      var t=rv('rft'),u=rv('rfu');if(!t||!u)return;
      var d={titolo:t,descrizione:rv('rfd'),url:u,tipo:rv('rftp'),categoria:rv('rfc'),autore_nome:rv('rfa')};
      var p=ec?api('risorse?id=eq.'+ec.id,{method:'PATCH',body:JSON.stringify(d)}):api('risorse',{method:'POST',body:JSON.stringify(d)});
      p.then(function(){window._rsClose();loadRS();});
    });
    var clH=h(function(){window._rsClose();});
    modal='<div class="modal-ov" onclick="if(event.target===this)window._rsClose()"><div class="modal-box anim"><div class="modal-handle"></div>'+mClose(clH)
      +'<div class="modal-title">&#x1F4C1; '+(ec?'Modifica':'Nuova')+' risorsa</div>'
      +field('Titolo *',inp('rft','Nome della risorsa','text',ec?ec.titolo:''))
      +'<div class="g2">'+field('Tipo',fsel('rftp',[['pdf','PDF'],['template','Template'],['checklist','Checklist'],['video','Video'],['altro','Altro']],ec?ec.tipo:'pdf'))+field('Autore',inp('rfa','','text',ec?ec.autore_nome||user.nome:user.nome))+'</div>'
      +field('URL *',inp('rfu','https://...','text',ec?ec.url||'':''))
      +'<div class="g2">'+field('Categoria',inp('rfc','','text',ec?ec.categoria||'generale':'generale'))+field('Descrizione',inp('rfd','','text',ec?ec.descrizione||'':''))+'</div>'
      +'<button class="btn btn-gold btn-full" style="margin-top:6px" data-click="'+svH+'">&#x1F4BE; Salva</button>'
    +'</div></div>';
  }
  var nH=canEdit?h(function(){s('rs_ec',null);s('rs_m',true);}):null;
  return'<div class="anim">'
    +'<div class="ph"><div><h1>&#x1F4C1; Risorse</h1><p>PDF, template e materiali esclusivi</p></div>'+(canEdit?'<button class="btn btn-gold btn-sm" data-click="'+nH+'">+ Aggiungi</button>':'')+'</div>'
    +'<div class="chip-row">'+filtChips+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">'+items+'</div>'
    +(filteredR.length===0?'<div class="empty">Nessuna risorsa disponibile.</div>':'')
    +modal
  +'</div>';
}

/* ── LIVE ── */
function loadLV(){api('live_sessioni?order=data_ora.desc').then(function(r){s('lv_l',r);});}

function renderLive(){
  var user=g('user',{});
  var lista=g('lv_l',null);if(lista===null){loadLV();return loading();}
  var isA=user.ruolo==='admin';
  var now=new Date();
  var future=lista.filter(function(x){return !x.completata&&x.data_ora&&new Date(x.data_ora)>now;});
  var replay=lista.filter(function(x){return x.url_replay;});
  var futH=future.map(function(x){
    var dt=x.data_ora?new Date(x.data_ora):null;
    var eH=isA?h(function(){s('lv_ec',x);s('lv_m',true);}):null;
    var dH=isA?h(function(){if(!confirm('Eliminare?'))return;api('live_sessioni?id=eq.'+x.id,{method:'DELETE'}).then(loadLV);}):null;
    return'<div class="card card-pad" style="margin-bottom:10px;display:flex;align-items:center;gap:14px">'
      +'<div style="width:52px;height:52px;border-radius:13px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">'
      +(dt?'<div style="font-size:1.2rem;font-weight:800;color:var(--red);line-height:1">'+dt.getDate()+'</div><div style="font-size:.55rem;text-transform:uppercase;color:var(--text3)">'+dt.toLocaleDateString('it-IT',{month:'short'})+'</div>':'<span style="font-size:1.3rem">&#x1F4C5;</span>')
      +'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;margin-bottom:3px;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(x.titolo)+'</div>'
        +'<div style="font-size:.75rem;color:var(--text2)">'+esc(x.istruttore_nome||'')+(dt?' &middot; '+dt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):'')+' &middot; '+(x.durata_minuti||60)+' min</div>'
      +'</div>'
      +'<div style="display:flex;gap:6px;flex-shrink:0">'
      +(x.url_join?'<a href="'+esc(x.url_join)+'" target="_blank" class="btn btn-red btn-sm" style="text-decoration:none">&#x1F534; Entra</a>':'')
      +(isA?'<button class="btn btn-ghost btn-xs" data-click="'+eH+'">&#x270F;</button><button class="btn btn-red btn-xs" data-click="'+dH+'">&#x1F5D1;</button>':'')
      +'</div></div>';
  }).join('');
  var repH=replay.map(function(x){
    var vid=yt(x.url_replay);
    var eH=isA?h(function(){s('lv_ec',x);s('lv_m',true);}):null;
    var dH=isA?h(function(){if(!confirm('Eliminare?'))return;api('live_sessioni?id=eq.'+x.id,{method:'DELETE'}).then(loadLV);}):null;
    return'<div class="card" style="padding:14px">'
      +(vid?'<div class="vw" style="margin-bottom:12px"><iframe src="https://www.youtube.com/embed/'+vid+'" allowfullscreen></iframe></div>':'<div style="height:100px;background:var(--bg2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin-bottom:12px">&#x1F3AC;</div>')
      +'<div style="font-weight:700;margin-bottom:3px;font-size:.9rem">'+esc(x.titolo)+'</div>'
      +'<div style="font-size:.75rem;color:var(--text2);margin-bottom:10px">'+esc(x.istruttore_nome||'')+' &middot; '+fD(x.data_ora)+'</div>'
      +(isA?'<div style="display:flex;gap:6px"><button class="btn btn-ghost btn-xs" data-click="'+eH+'">&#x270F;</button><button class="btn btn-red btn-xs" data-click="'+dH+'">&#x1F5D1;</button></div>':'')
    +'</div>';
  }).join('');
  window._lvClose=function(){s('lv_m',false);s('lv_ec',null);};
  var modal='';
  if(g('lv_m',false)){
    var ec=g('lv_ec',null);
    var svH=h(function(){
      var t=rv('lft');if(!t)return;
      var d={titolo:t,descrizione:rv('lfd'),data_ora:rv('lfdt'),url_join:rv('lfj'),url_replay:rv('lfr'),istruttore_nome:rv('lfi'),durata_minuti:parseInt(rv('lfdu'))||60};
      var p=ec?api('live_sessioni?id=eq.'+ec.id,{method:'PATCH',body:JSON.stringify(d)}):api('live_sessioni',{method:'POST',body:JSON.stringify(d)});
      p.then(function(){window._lvClose();loadLV();});
    });
    var clH=h(function(){window._lvClose();});
    modal='<div class="modal-ov" onclick="if(event.target===this)window._lvClose()"><div class="modal-box anim"><div class="modal-handle"></div>'+mClose(clH)
      +'<div class="modal-title">&#x1F3A5; '+(ec?'Modifica':'Nuova')+' sessione live</div>'
      +field('Titolo *',inp('lft','Titolo','text',ec?ec.titolo:''))
      +'<div class="g2">'+field('Data e ora',inp('lfdt','','datetime-local',ec?ec.data_ora||'':''))+field('Durata (min)',inp('lfdu','','number',String(ec?ec.durata_minuti||60:60)))+'</div>'
      +field('Istruttore',inp('lfi','','text',ec?ec.istruttore_nome||user.nome:user.nome))
      +field('Link Zoom/Meet',inp('lfj','https://zoom.us/...','text',ec?ec.url_join||'':''))
      +field('Link Replay YouTube',inp('lfr','https://youtube.com/watch?v=...','text',ec?ec.url_replay||'':''))
      +field('Descrizione',ta('lfd','',ec?ec.descrizione||'':''))
      +'<button class="btn btn-gold btn-full" style="margin-top:6px" data-click="'+svH+'">&#x1F4BE; Salva</button>'
    +'</div></div>';
  }
  var nH=isA?h(function(){s('lv_ec',null);s('lv_m',true);}):null;
  return'<div class="anim">'
    +'<div class="ph"><div><h1>&#x1F3A5; Live &amp; Replay</h1><p>Sessioni dal vivo e registrazioni</p></div>'+(isA?'<button class="btn btn-gold btn-sm" data-click="'+nH+'">+ Nuova</button>':'')+'</div>'
    +(future.length?'<div style="margin-bottom:20px"><div class="section-title" style="color:var(--red)">&#x1F534; PROSSIME LIVE</div>'+futH+'</div>':'')
    +(replay.length?'<div><div class="section-title">&#x1F3AC; REPLAY</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px">'+repH+'</div></div>':'')
    +(lista.length===0?'<div class="empty">Nessuna sessione programmata.</div>':'')
    +modal
  +'</div>';
}

/* ── MAIN RENDER ── */
function getTabTitle(){
  var m={'dashboard':'Home','corsi':'Corsi','studenti':'Studenti','istruttori':'Istruttori','community':'Community','risorse':'Risorse','live':'Live & Replay'};
  return m[g('tab','dashboard')]||'';
}

function renderApp(){
  _h={};_n=0;
  var user=g('user',null);
  if(!user)return renderLogin();
  var tab=g('tab','dashboard'),isA=user.ruolo==='admin';
  var showBack=_hist.length>0||g('corso_aperto',null)!==null;
  var content='';
  if(tab==='dashboard')content=renderDash();
  else if(tab==='corsi')content=isA?renderAdminCorsi():renderCorsi();
  else if(tab==='studenti')content=renderUtenti('studente');
  else if(tab==='istruttori')content=renderUtenti('istruttore');
  else if(tab==='community')content=renderCommunity();
  else if(tab==='risorse')content=renderRisorse();
  else if(tab==='live')content=renderLive();
  return'<div class="app-shell">'
    +renderSidebar()
    +'<div class="main-wrap">'
      +renderTopbar(getTabTitle(),showBack)
      +'<div class="page">'+content+'</div>'
    +'</div>'
    +renderBotNav()
  +'</div>';
}

window._s=_s;
window.redraw=redraw;
_root=document.getElementById('app');
redraw();
})();
</script>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesWorld Academy</title>
<style>
:root{--bg:#07070f;--bg2:#0d0d1a;--bg3:#131326;--card:#0f0f1e;--gold:#F59E0B;--cyan:#06B6D4;--green:#10B981;--red:#EF4444;--purple:#8B5CF6;--text:#F1F5F9;--text2:#94A3B8;--text3:#475569;--border:rgba(245,158,11,0.15);--border2:rgba(255,255,255,0.06);--grad:linear-gradient(135deg,#F59E0B,#D97706)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:rgba(245,158,11,.3);border-radius:3px}
/* LAYOUT */
#app{min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
.main-area{margin-left:240px;flex:1;min-height:100vh}
.topbar{position:sticky;top:0;z-index:40;background:rgba(7,7,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.content{padding:28px}
/* SIDEBAR */
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--border2)}
.sb-logo-main{font-size:1rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-logo-sub{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.sb-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:none;background:none;color:var(--text2);font-size:.855rem;font-weight:500;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s}
.sb-btn:hover,.sb-btn.active{background:rgba(245,158,11,.12);color:var(--gold)}
.sb-user{padding:14px 10px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;background:var(--grad);color:#000;flex-shrink:0}
.sb-logout{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:4px;font-family:inherit}
.sb-logout:hover{color:var(--red)}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:22px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:.875rem;font-family:inherit;transition:all .2s}
.btn-gold{background:var(--grad);color:#000;padding:11px 20px}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,158,11,.3)}
.btn-gold:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text2);padding:9px 16px;border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn-red{background:rgba(239,68,68,.1);color:#EF4444;padding:8px 13px;border:1px solid rgba(239,68,68,.2)}
.btn-red:hover{background:rgba(239,68,68,.18)}
.btn-cyan{background:rgba(6,182,212,.1);color:var(--cyan);padding:8px 13px;border:1px solid rgba(6,182,212,.2)}
.btn-sm{padding:6px 11px!important;font-size:.78rem!important}
/* FORM */
.ff{margin-bottom:14px}
.ff label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
.ff input,.ff select,.ff textarea{width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--gold)}
.ff textarea{resize:vertical;min-height:80px}
/* BADGE */
.badge{display:inline-flex;padding:2px 9px;border-radius:50px;font-size:.7rem;font-weight:700}
.badge-gold{background:rgba(245,158,11,.15);color:var(--gold)}
.badge-cyan{background:rgba(6,182,212,.15);color:var(--cyan)}
.badge-green{background:rgba(16,185,129,.15);color:var(--green)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-purple{background:rgba(139,92,246,.15);color:var(--purple)}
.badge-gray{background:rgba(255,255,255,.08);color:var(--text2)}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* PROGRESS */
.pbar{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin:10px 0}
.pfill{height:100%;border-radius:3px;background:var(--grad);transition:width .6s}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 13px;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border2)}
.tbl td{padding:12px 13px;font-size:.855rem;border-bottom:1px solid var(--border2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:34px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:14px;background:var(--bg3);border:none;color:var(--text2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-family:inherit}
.modal-close:hover{background:rgba(239,68,68,.2);color:var(--red)}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.login-blob1{position:absolute;width:600px;height:600px;top:-200px;right:-200px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.07) 0%,transparent 70%);pointer-events:none}
.login-blob2{position:absolute;width:400px;height:400px;bottom:-100px;left:-100px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,.07) 0%,transparent 70%);pointer-events:none}
.login-card{position:relative;z-index:2;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
/* VIDEO */
.vw{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;background:#000}
.vw iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
/* KPI */
.kpi-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:12px}
.kpi-val{font-size:1.9rem;font-weight:800;line-height:1}
.kpi-lbl{font-size:.75rem;color:var(--text2);margin-top:3px}
/* MISC */
.page-hdr{margin-bottom:24px}
.page-hdr h1{font-size:1.45rem;font-weight:800}
.page-hdr p{font-size:.855rem;color:var(--text2);margin-top:3px}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.flex-gap{display:flex;align-items:center;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* LESSON */
.lrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;border:1px solid transparent;margin-bottom:3px}
.lrow:hover{background:var(--bg3)}
.lrow.active{background:rgba(245,158,11,.08);border-color:var(--border)}
.lcheck{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0}
.lcheck.done{background:var(--green);border-color:var(--green);color:white}
/* COMMUNITY */
.post-av{width:38px;height:38px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#000;flex-shrink:0}
.pact{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;padding:4px 8px;border-radius:6px;font-family:inherit}
.pact:hover{color:var(--gold);background:rgba(245,158,11,.08)}
@media(max-width:768px){.sidebar{display:none}.main-area{margin-left:0}.g4,.g3,.g2,.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════
// SALESWORLD ACADEMY — Vanilla JS, zero dipendenze
// ═══════════════════════════════════════════════

const SBURL = 'https://khcipjozfamdrhspaxjh.supabase.co';
const SBKEY = 'sb_publishable_WhQ9J2Dphtxbgkk0vrTu3A_xV1lFLmZ';

// ── Supabase helper ──────────────────────────────
function sb(path, opts) {
  opts = opts || {};
  return fetch(SBURL + '/rest/v1/' + path, {
    method: opts.method || 'GET',
    headers: {
      'apikey': SBKEY,
      'Authorization': 'Bearer ' + SBKEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: opts.body || undefined
  }).then(r => r.text()).then(t => {
    if (!t) return [];
    try { return JSON.parse(t); } catch(e) { return []; }
  });
}

// ── Tiny UI framework ────────────────────────────
let _state = {};
let _rootEl = null;
let _renderFn = null;
let _renderQueued = false;

function setState(key, val) {
  _state[key] = val;
  if (!_renderQueued) {
    _renderQueued = true;
    requestAnimationFrame(() => { _renderQueued = false; rerender(); });
  }
}
function getState(key, def) { return key in _state ? _state[key] : def; }
function rerender() { if (_rootEl && _renderFn) _rootEl.innerHTML = _renderFn(); }

function el(tag, attrs, ...children) {
  let str = '<' + tag;
  if (attrs) for (let k in attrs) {
    if (k === 'style' && typeof attrs[k] === 'object') {
      let s = Object.entries(attrs[k]).map(([p,v]) => p.replace(/([A-Z])/g, m => '-'+m.toLowerCase())+':'+v).join(';');
      str += ' style="' + s.replace(/"/g, '&quot;') + '"';
    } else if (k !== 'onclick' && k !== 'oninput' && k !== 'onchange' && k !== 'onsubmit' && k !== 'onfocus' && k !== 'onblur') {
      if (attrs[k] !== false && attrs[k] !== null && attrs[k] !== undefined)
        str += ' ' + k + '="' + String(attrs[k]).replace(/"/g, '&quot;') + '"';
    }
  }
  str += '>';
  const voids = {area:1,base:1,br:1,col:1,hr:1,img:1,input:1,link:1,meta:1,param:1,source:1,track:1,wbr:1};
  if (!voids[tag]) {
    for (let c of children) if (c !== null && c !== undefined && c !== false) str += Array.isArray(c) ? c.join('') : c;
    str += '</' + tag + '>';
  }
  return str;
}

let _handlers = {};
let _hid = 0;

function fn(f) {
  const id = 'h' + (_hid++);
  _handlers[id] = f;
  return id;
}



// Better approach: event delegation
document.addEventListener('click', e => {
  let t = e.target;
  while (t && t !== document) {
    if (t.dataset && t.dataset.click) {
      const h = t.dataset.click;
      if (_handlers[h]) { _handlers[h](e); return; }
    }
    t = t.parentElement;
  }
});
document.addEventListener('input', e => {
  if (e.target.dataset && e.target.dataset.input) {
    const h = _handlers[e.target.dataset.input];
    if (h) h(e);
  }
});
document.addEventListener('change', e => {
  if (e.target.dataset && e.target.dataset.change) {
    const h = _handlers[e.target.dataset.change];
    if (h) h(e);
  }
});
document.addEventListener('submit', e => {
  if (e.target.dataset && e.target.dataset.submit) {
    e.preventDefault();
    const h = _handlers[e.target.dataset.submit];
    if (h) h(e);
  }
});
document.addEventListener('keydown', e => {
  if (e.target.dataset && e.target.dataset.keydown) {
    const h = _handlers[e.target.dataset.keydown];
    if (h) h(e);
  }
});

// ── Utils ────────────────────────────────────────
function ytId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&\n?#]+)/);
  return m ? m[1] : null;
}
function ini(n) { if (!n) return '?'; return n.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2); }
function fmtD(ts) { if (!ts) return '—'; return new Date(ts).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDT(ts) { if (!ts) return '—'; return new Date(ts).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function ago(ts) {
  const d = (Date.now() - new Date(ts))/1000;
  if (d < 60) return 'ora'; if (d < 3600) return Math.floor(d/60)+' min fa';
  if (d < 86400) return Math.floor(d/3600)+' ore fa'; return Math.floor(d/86400)+' gg fa';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function inp(key, placeholder, type) {
  type = type || 'text';
  const hid = fn(e => { setState(key, e.target.value); });
  return `<input class="ff-inp" type="${esc(type)}" value="${esc(getState(key,''))}" placeholder="${esc(placeholder||'')}" data-input="${hid}" autocomplete="off" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`;
}
function sel(key, options) {
  const hid = fn(e => { setState(key, e.target.value); });
  const opts = options.map(([v,l]) => `<option value="${esc(v)}" ${getState(key,'')===v?'selected':''}>${esc(l)}</option>`).join('');
  return `<select data-change="${hid}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">${opts}</select>`;
}
function textarea(key, placeholder) {
  const hid = fn(e => { setState(key, e.target.value); });
  return `<textarea data-input="${hid}" placeholder="${esc(placeholder||'')}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none;resize:vertical;min-height:80px;display:block">${esc(getState(key,''))}</textarea>`;
}
function ffld(label, content) {
  return `<div class="ff"><label style="display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:5px">${esc(label)}</label>${content}</div>`;
}
function modal(title, content, closeKey) {
  const hid = fn(() => setState(closeKey, false));
  return `<div class="modal-overlay" data-click="${hid}"><div class="modal-box" onclick="event.stopPropagation()"><button class="modal-close" data-click="${fn(() => setState(closeKey, false))}">✕</button><div style="font-size:1.15rem;font-weight:700;margin-bottom:22px">${esc(title)}</div>${content}</div></div>`;
}
function btn(label, clickFn, cls) {
  cls = cls || 'btn btn-gold';
  const hid = fn(clickFn);
  return `<button class="${cls}" data-click="${hid}">${label}</button>`;
}

// ── Sidebar ──────────────────────────────────────
function renderSidebar() {
  const user = getState('user', {});
  const tab = getState('tab', 'dashboard');
  const isAdmin = user.ruolo === 'admin';
  const nav = isAdmin
    ? [['dashboard','📊','Dashboard'],['studenti','👥','Studenti'],['istruttori','🎓','Istruttori'],['corsi','📚','Corsi'],['community','💬','Community'],['risorse','📁','Risorse'],['live','🎥','Live & Replay']]
    : [['dashboard','🏠','Dashboard'],['corsi','📚','Corsi'],['community','💬','Community'],['risorse','📁','Risorse'],['live','🎥','Live']];
  const roleLabel = isAdmin ? 'Manager' : user.ruolo === 'istruttore' ? 'Istruttore' : 'Studente';
  const roleColor = isAdmin ? 'var(--gold)' : user.ruolo === 'istruttore' ? 'var(--purple)' : 'var(--cyan)';
  const navHtml = nav.map(([id, icon, label]) => {
    const hid = fn(() => { setState('tab', id); setState('corso_aperto', null); });
    return `<button class="sb-btn ${tab===id?'active':''}" data-click="${hid}"><span style="width:20px;text-align:center">${icon}</span>${esc(label)}</button>`;
  }).join('');
  const logoutHid = fn(() => setState('user', null));
  return `<div class="sidebar">
    <div class="sb-logo"><div class="sb-logo-main">⚡ SalesWorld</div><div class="sb-logo-sub">Academy Platform</div></div>
    <div class="sb-nav">${navHtml}</div>
    <div class="sb-user">
      <div class="sb-av">${ini(user.nome)}</div>
      <div style="flex:1;min-width:0"><div style="font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(user.nome)}</div><div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:${roleColor}">${esc(roleLabel)}</div></div>
      <button class="sb-logout" data-click="${logoutHid}" title="Esci">⏻</button>
    </div>
  </div>`;
}

function renderTopbar() {
  const user = getState('user', {});
  const isAdmin = user.ruolo === 'admin';
  const lbl = isAdmin ? '👑 Manager' : user.ruolo === 'istruttore' ? '🎓 Istruttore' : '🎓 Studente';
  const cls = isAdmin ? 'badge badge-gold' : user.ruolo === 'istruttore' ? 'badge badge-purple' : 'badge badge-cyan';
  return `<div class="topbar"><div style="font-weight:700;color:var(--text2);font-size:.875rem">SalesWorld Academy</div><div class="flex-gap"><span class="${cls}">${lbl}</span><span style="font-size:.855rem;font-weight:500">${esc(user.nome)}</span></div></div>`;
}

// ── LOGIN ────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('login-u');
  const p = document.getElementById('login-p');
  const errEl = document.getElementById('login-err');
  const btnEl = document.getElementById('login-btn');
  if (!u || !p) return;
  const uv = u.value.trim();
  const pv = p.value;
  if (!uv || !pv) { errEl.textContent = 'Inserisci username e password.'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';
  btnEl.disabled = true;
  btnEl.textContent = '⏳ Accesso...';
  sb('utenti?username=eq.'+encodeURIComponent(uv)+'&password=eq.'+encodeURIComponent(pv)+'&attivo=eq.true')
    .then(rows => {
      if (rows && rows.length) {
        setState('user', rows[0]);
        setState('tab', 'dashboard');
        loadDashboardData();
      } else {
        errEl.textContent = 'Credenziali errate o account non attivo.';
        errEl.style.display = 'block';
        btnEl.disabled = false;
        btnEl.textContent = '🚀 Accedi';
      }
    }).catch(() => {
      errEl.textContent = 'Errore di connessione. Riprova.';
      errEl.style.display = 'block';
      btnEl.disabled = false;
      btnEl.textContent = '🚀 Accedi';
    });
}

function renderLogin() {
  return `<div class="login-page">
    <div class="login-blob1"></div><div class="login-blob2"></div>
    <div class="login-card">
      <div style="text-align:center;margin-bottom:32px">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:16px;background:var(--grad);font-size:1.6rem;margin-bottom:14px">🏆</div>
        <div style="font-size:1.4rem;font-weight:800">SalesWorld Academy</div>
        <div style="font-size:.82rem;color:var(--text2);margin-top:5px">Accedi alla tua area riservata</div>
      </div>
      <div>
        <div class="ff">
          <label style="display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:5px">Username</label>
          <input id="login-u" type="text" autocomplete="username" placeholder="Il tuo username"
            style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="ff">
          <label style="display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:5px">Password</label>
          <input id="login-p" type="password" autocomplete="current-password" placeholder="La tua password"
            style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div id="login-err" style="display:none;color:#EF4444;font-size:.82rem;margin-bottom:12px;padding:8px 12px;background:rgba(239,68,68,.10);border-radius:8px"></div>
        <button id="login-btn" onclick="doLogin()" class="btn btn-gold" style="width:100%;margin-top:4px">🚀 Accedi</button>
      </div>
      <div style="text-align:center;margin-top:20px;font-size:.75rem;color:var(--text3)">Non hai accesso? Contatta il manager.</div>
    </div>
  </div>`;
}

// ── DASHBOARD ────────────────────────────────────
function loadDashboardData() {
  const user = getState('user', {});

  if (isAdmin) {

  }
  sb('corsi?pubblicato=eq.true').then(r => setState('dash_corsi', r.length));
  sb('lezioni').then(r => setState('dash_lezioni', r.length));
  sb('community_posts').then(r => setState('dash_posts', r.length));
  if (!isAdmin) sb('progressi?studente_id=eq.'+user.id+'&completata=eq.true').then(r => setState('dash_completate', r.length));

    setState('dash_live', r.filter(s => s.data_ora && new Date(s.data_ora) > now).slice(0,3));

}

function loadCorsi() {

function renderCorsi() {
  const user = getState('user', {});
  const corsi = getState('corsi_lista', null);
  const src = getState('corsi_src', '');
  const aperto = getState('corso_aperto', null);

  if (corsi === null) { loadCorsi(); return '<div style="color:var(--text3);padding:40px;text-align:center">⏳ Caricamento...</div>'; }
  if (aperto) return renderCourseViewer(aperto);

  const srcHid = fn(e => setState('corsi_src', e.target.value));
  const filt = corsi.filter(c => c.titolo.toLowerCase().includes(src.toLowerCase()));
  const livCls = {base:'badge badge-green',intermedio:'badge badge-gold',avanzato:'badge badge-red'};

  const cards = filt.map(c => {
    const openHid = fn(() => { setState('corso_aperto', c); loadCourseViewer(c); });
    return `<div class="card" style="cursor:pointer;transition:all .3s;border-color:var(--border2)" data-click="${openHid}" onmouseenter="this.style.transform='translateY(-4px)';this.style.borderColor='var(--border)'" onmouseleave="this.style.transform='';this.style.borderColor='var(--border2)'">
      <div style="height:130px;border-radius:10px;background:linear-gradient(135deg,${(c.colore||'#F59E0B')}22,${(c.colore||'#F59E0B')}11);display:flex;align-items:center;justify-content:center;font-size:3rem;margin-bottom:14px">${c.emoji||'📚'}</div>
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <span class="${livCls[c.livello]||'badge badge-gray'}">${esc(c.livello||'base')}</span>
        ${!c.pubblicato?'<span class="badge badge-red">Bozza</span>':''}
      </div>
      <div style="font-weight:700;font-size:1rem;margin-bottom:5px">${esc(c.titolo)}</div>
      <div style="font-size:.8rem;color:var(--text2);line-height:1.5;margin-bottom:10px">${esc(c.descrizione||'')}</div>
      <div style="font-size:.75rem;color:var(--text3)">👨‍🏫 ${esc(c.istruttore_nome||'Academy')}</div>
    </div>`;
  }).join('');

  return `<div>
    <div class="page-hdr"><div class="flex-between">
      <div><h1>📚 Corsi</h1><p>I tuoi corsi disponibili</p></div>
      <input style="padding:9px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;color:var(--text);outline:none;width:200px;font-family:inherit;font-size:.855rem" placeholder="🔍 Cerca..." value="${esc(src)}" data-input="${srcHid}">
    </div></div>
    <div class="g3">${cards}</div>
    ${filt.length===0?'<div style="text-align:center;color:var(--text3);padding:60px">Nessun corso trovato.</div>':''}
  </div>`;
}

function loadCourseViewer(corso) {
  sb('moduli?corso_id=eq.'+corso.id+'&order=ordine.asc').then(m => {
    setState('cv_mods', m);
    if (m.length) setState('cv_mopen', m[0].id);
  });
  sb('lezioni?corso_id=eq.'+corso.id+'&order=ordine.asc').then(l => {
    setState('cv_lez', l);
    if (l.length) setState('cv_latt', l[0]);
  });
  const user = getState('user', {});
  if (user.id) sb('progressi?studente_id=eq.'+user.id).then(p => setState('cv_prog', p));
}

function renderCourseViewer(corso) {
  const mods = getState('cv_mods', []);
  const lez = getState('cv_lez', []);
  const prog = getState('cv_prog', []);
  const latt = getState('cv_latt', null);
  const mopen = getState('cv_mopen', null);

  function isDone(lid) { return prog.some(p => p.lezione_id===lid && p.completata); }
  const tot = lez.length;
  const comp = lez.filter(l => isDone(l.id)).length;
  const pct = tot ? Math.round(comp/tot*100) : 0;
  const vid = latt ? ytId(latt.video_url) : null;

  const backHid = fn(() => setState('corso_aperto', null));

  function segnaHid(lid) {
    return fn(() => {
      const user = getState('user', {});
      const pr = getState('cv_prog', []);
      const ex = pr.find(p => p.lezione_id===lid);
      const prom = ex
        ? sb('progressi?id=eq.'+ex.id, {method:'PATCH', body:JSON.stringify({completata:true})})
        : sb('progressi', {method:'POST', body:JSON.stringify({studente_id:user.id,lezione_id:lid,completata:true})});
      prom.then(() => sb('progressi?studente_id=eq.'+user.id).then(p => setState('cv_prog', p)));
    });
  }

  const modsHtml = mods.map(m => {
    const lm = lez.filter(l => l.modulo_id===m.id);
    const cm = lm.filter(l => isDone(l.id)).length;
    const toggleHid = fn(() => setState('cv_mopen', mopen===m.id ? null : m.id));
    const lezHtml = mopen===m.id ? lm.map(l => {
      const selHid = fn(() => setState('cv_latt', l));
      return `<div class="lrow ${latt&&latt.id===l.id?'active':''}" data-click="${selHid}">
        <div class="lcheck ${isDone(l.id)?'done':''}">${isDone(l.id)?'✓':''}</div>
        <div style="flex:1;min-width:0"><div style="font-size:.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.titolo)}</div>${l.durata_minuti>0?`<div style="font-size:.7rem;color:var(--text3)">${l.durata_minuti} min</div>`:''}</div>
        ${l.video_url?'<span style="font-size:.9rem">▶️</span>':''}
      </div>`;
    }).join('') : '';
    return `<div style="margin-bottom:6px">
      <button data-click="${toggleHid}" style="width:100%;background:${mopen===m.id?'rgba(245,158,11,.08)':'var(--bg3)'};border:1px solid ${mopen===m.id?'var(--border)':'transparent'};border-radius:9px;padding:9px 12px;color:var(--text);font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:.855rem;font-weight:600">
        <span>${esc(m.titolo)}</span>
        <span style="font-size:.7rem;color:var(--text3)">${cm}/${lm.length} ${mopen===m.id?'▲':'▼'}</span>
      </button>
      ${lezHtml}
    </div>`;
  }).join('');

  const videoHtml = vid
    ? `<div class="vw" style="margin-bottom:18px"><iframe src="https://www.youtube.com/embed/${vid}?rel=0" allowfullscreen title="${esc(latt?latt.titolo:'')}"></iframe></div>`
    : `<div style="height:180px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:3rem;margin-bottom:18px">🎬</div>`;

  const doneBtn = latt ? (isDone(latt.id)
    ? `<div style="color:var(--green);font-weight:700;font-size:.875rem;display:flex;align-items:center;gap:5px">✅ Completata</div>`
    : `<button class="btn btn-gold btn-sm" data-click="${segnaHid(latt.id)}">✅ Segna completata</button>`) : '';

  return `<div>
    <div style="margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="btn btn-ghost" data-click="${backHid}">← Tutti i corsi</button>
      <div style="font-weight:700;font-size:1.1rem">${esc(corso.emoji||'📚')} ${esc(corso.titolo)}</div>
      <div style="margin-left:auto;font-size:.82rem;color:var(--text2)">Progresso: <strong style="color:var(--gold)">${pct}%</strong></div>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;margin-top:16px">
      <div>
        ${latt ? `<div class="card">${videoHtml}
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
            <div>
              <div style="font-weight:800;font-size:1.15rem;margin-bottom:5px">${esc(latt.titolo)}</div>
              ${latt.durata_minuti>0?`<div style="font-size:.78rem;color:var(--text2)">⏱️ ${latt.durata_minuti} min</div>`:''}
            </div>
            ${doneBtn}
          </div>
          ${latt.contenuto?`<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border2);font-size:.9rem;line-height:1.8;color:var(--text2)">${esc(latt.contenuto)}</div>`:''}
        </div>` : `<div class="card" style="text-align:center;padding:60px;color:var(--text3)">Seleziona una lezione →</div>`}
      </div>
      <div>
        <div class="card" style="padding:14px">
          <div style="font-weight:700;font-size:.875rem;margin-bottom:14px">📋 Contenuto</div>
          ${modsHtml}
          ${mods.length===0?'<div style="text-align:center;color:var(--text3);padding:16px;font-size:.82rem">Nessun contenuto ancora.</div>':''}
        </div>
      </div>
    </div>
  </div>`;
}

        ${ffld('Visibilità', `<select data-change="${fn(e=>setState('ac_fc',Object.assign({},fc,{pubblicato:e.target.value==='si'})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none"><option value="no" ${!fc.pubblicato?'selected':''}>📝 Bozza</option><option value="si" ${fc.pubblicato?'selected':''}>✅ Pubblicato</option></select>`)}
      </div>
      ${ffld('Istruttore', `<select data-change="${istrHid}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">${istrOpts.map(([v,l])=>`<option value="${esc(v)}" ${fc.istruttore_id===v?'selected':''}>${esc(l)}</option>`).join('')}</select>`)}
      <button class="btn btn-gold" style="width:100%;margin-top:8px" data-click="${saveHid}">💾 Salva corso</button>
    </div></div>`;
  }
  if (showMM) {
    const fm = getState('ac_fm', {});
    const emid = getState('ac_emid', null);
    const saveHid = fn(() => {
      if (!fm.titolo || !csel) return;
      const data = Object.assign({}, fm, emid ? {} : {corso_id:csel.id});
      const p = emid ? sb('moduli?id=eq.'+emid,{method:'PATCH',body:JSON.stringify(fm)}) : sb('moduli',{method:'POST',body:JSON.stringify(data)});
      p.then(() => { setState('ac_showmm',false); setState('ac_emid',null); sb('moduli?corso_id=eq.'+csel.id+'&order=ordine.asc').then(r=>setState('ac_mods',r)); });
    });
    modalHtml += `<div class="modal-overlay" data-click="${fn(()=>setState('ac_showmm',false))}"><div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" data-click="${fn(()=>setState('ac_showmm',false))}">✕</button>
      <div style="font-size:1.15rem;font-weight:700;margin-bottom:22px">${emid?'Modifica modulo':'Nuovo modulo'}</div>
      ${ffld('Titolo *', `<input value="${esc(fm.titolo||'')}" data-input="${fn(e=>setState('ac_fm',Object.assign({},fm,{titolo:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      ${ffld('Ordine', `<input type="number" value="${fm.ordine||0}" data-input="${fn(e=>setState('ac_fm',Object.assign({},fm,{ordine:+e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      <button class="btn btn-gold" style="width:100%;margin-top:8px" data-click="${saveHid}">💾 Salva modulo</button>
    </div></div>`;
  }
  if (showML) {
    const fl = getState('ac_fl', {});
    const elid = getState('ac_elid', null);
    const lv = ytId(fl.video_url);
    const saveHid = fn(() => {
      if (!fl.titolo || !msel || !csel) return;
      const data = Object.assign({}, fl, elid ? {} : {modulo_id:msel.id,corso_id:csel.id});
      const p = elid ? sb('lezioni?id=eq.'+elid,{method:'PATCH',body:JSON.stringify(fl)}) : sb('lezioni',{method:'POST',body:JSON.stringify(data)});
      p.then(() => { setState('ac_showml',false); setState('ac_elid',null); sb('lezioni?modulo_id=eq.'+msel.id+'&order=ordine.asc').then(r=>setState('ac_lez',r)); });
    });
    modalHtml += `<div class="modal-overlay" data-click="${fn(()=>setState('ac_showml',false))}"><div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" data-click="${fn(()=>setState('ac_showml',false))}">✕</button>
      <div style="font-size:1.15rem;font-weight:700;margin-bottom:22px">${elid?'Modifica lezione':'Nuova lezione'}</div>
      ${ffld('Titolo *', `<input value="${esc(fl.titolo||'')}" data-input="${fn(e=>setState('ac_fl',Object.assign({},fl,{titolo:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      ${ffld('URL Video YouTube', `<input value="${esc(fl.video_url||'')}" data-input="${fn(e=>setState('ac_fl',Object.assign({},fl,{video_url:e.target.value})))}" placeholder="https://youtube.com/watch?v=..." style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}

      ${ffld('Note / Contenuto', `<textarea data-input="${fn(e=>setState('ac_fl',Object.assign({},fl,{contenuto:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none;resize:vertical;min-height:80px;display:block">${esc(fl.contenuto||'')}</textarea>`)}
      <div class="grid2">
        ${ffld('Durata (min)', `<input type="number" value="${fl.durata_minuti||0}" data-input="${fn(e=>setState('ac_fl',Object.assign({},fl,{durata_minuti:+e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
        ${ffld('Ordine', `<input type="number" value="${fl.ordine||0}" data-input="${fn(e=>setState('ac_fl',Object.assign({},fl,{ordine:+e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      </div>
      <button class="btn btn-gold" style="width:100%;margin-top:8px" data-click="${saveHid}">💾 Salva lezione</button>
    </div></div>`;
  }

  const pubHid = csel ? fn(() => { sb('corsi?id=eq.'+csel.id,{method:'PATCH',body:JSON.stringify({pubblicato:!csel.pubblicato})}).then(()=>{ const nc=Object.assign({},csel,{pubblicato:!csel.pubblicato}); setState('ac_csel',nc); sb('corsi?order=ordine.asc').then(r=>setState('ac_corsi',r)); }); }) : null;
  const editCorsoHid = csel ? fn(()=>{ setState('ac_fc',{titolo:csel.titolo,descrizione:csel.descrizione||'',emoji:csel.emoji||'📚',livello:csel.livello||'base',colore:csel.colore||'#F59E0B',istruttore_nome:csel.istruttore_nome||'',istruttore_id:csel.istruttore_id||'',pubblicato:csel.pubblicato}); setState('ac_ecid',csel.id); setState('ac_showmc',true); }) : null;
  const delCorsoHid = csel ? fn(()=>{ if(!confirm('Eliminare corso?')) return; sb('corsi?id=eq.'+csel.id,{method:'DELETE'}).then(()=>{ setState('ac_csel',null); setState('ac_mods',[]); setState('ac_lez',[]); sb('corsi?order=ordine.asc').then(r=>setState('ac_corsi',r)); }); }) : null;

  return `<div>
    <div class="page-hdr"><div class="flex-between">
      <div><h1>📚 Gestione Corsi</h1><p>Crea corsi, moduli e lezioni</p></div>
      <button class="btn btn-gold" data-click="${newCorsoHid}">+ Nuovo corso</button>
    </div></div>
    <div style="display:grid;grid-template-columns:240px 240px 1fr;gap:14px;align-items:start">
      <div class="card" style="padding:12px">
        <div style="font-weight:700;font-size:.78rem;color:var(--text3);margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase">Corsi</div>
        ${corsiHtml}
        ${corsi.length===0?'<div style="text-align:center;color:var(--text3);padding:16px;font-size:.78rem">Nessun corso.</div>':''}
      </div>
      <div class="card" style="padding:12px">
        <div style="font-weight:700;font-size:.78rem;color:var(--text3);margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between">

        </div>
        ${!csel?'<div style="text-align:center;color:var(--text3);padding:16px;font-size:.78rem">Seleziona un corso</div>':''}
        ${modsHtml}
      </div>
      <div class="card" style="padding:12px">
        <div style="font-weight:700;font-size:.78rem;color:var(--text3);margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between">
          Lezioni ${msel?`<button class="btn btn-gold" style="font-size:.68rem;padding:3px 8px" data-click="${newLezHid}">+</button>`:''}
        </div>
        ${!msel?'<div style="text-align:center;color:var(--text3);padding:16px;font-size:.78rem">Seleziona un modulo</div>':''}
        ${csel&&msel?`<div style="margin-bottom:10px;padding:8px 10px;background:var(--bg3);border-radius:9px;font-size:.78rem;color:var(--text2)">
          <strong style="color:var(--gold)">${esc(csel.titolo)}</strong> › ${esc(msel.titolo)}
          <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn ${csel.pubblicato?'btn-red':'btn-cyan'}" style="padding:3px 8px;font-size:.7rem" data-click="${pubHid}">${csel.pubblicato?'🔒 Archivia':'✅ Pubblica'}</button>
            <button class="btn btn-ghost" style="padding:3px 8px;font-size:.7rem" data-click="${editCorsoHid}">✏️ Modifica</button>
            <button class="btn btn-red" style="padding:3px 8px;font-size:.7rem" data-click="${delCorsoHid}">🗑️</button>
          </div>
        </div>`:''}
        ${lezHtml}
      </div>
    </div>
    ${modalHtml}
  </div>`;
}

// ── ADMIN UTENTI ─────────────────────────────────
function loadUtenti(ruolo) { sb('utenti?ruolo=eq.'+ruolo+'&order=created_at.desc').then(r => setState('ut_lista_'+ruolo, r)); }

function renderUtenti(ruolo) {
  const lista = getState('ut_lista_'+ruolo, null);
  if (lista === null) { loadUtenti(ruolo); return '<div style="text-align:center;padding:40px;color:var(--text3)">⏳ Caricamento...</div>'; }
  const label = ruolo==='istruttore' ? 'Istruttori' : 'Studenti';
  const src = getState('ut_src_'+ruolo, '');
  const showM = getState('ut_showm_'+ruolo, false);
  const form = getState('ut_form_'+ruolo, {username:'',password:'',nome:'',email:'',attivo:true});
  const eid = getState('ut_eid_'+ruolo, null);
  const srcHid = fn(e => setState('ut_src_'+ruolo, e.target.value));
  const newHid = fn(() => { setState('ut_form_'+ruolo,{username:'',password:'',nome:'',email:'',attivo:true}); setState('ut_eid_'+ruolo,null); setState('ut_showm_'+ruolo,true); });

  const filt = lista.filter(s => (s.nome||'').toLowerCase().includes(src.toLowerCase()) || (s.username||'').toLowerCase().includes(src.toLowerCase()));

  const rows = filt.map(s => {
    const editHid = fn(() => { setState('ut_form_'+ruolo,{username:s.username,password:s.password,nome:s.nome||'',email:s.email||'',attivo:s.attivo}); setState('ut_eid_'+ruolo,s.id); setState('ut_showm_'+ruolo,true); });
    const togHid = fn(() => sb('utenti?id=eq.'+s.id,{method:'PATCH',body:JSON.stringify({attivo:!s.attivo})}).then(()=>loadUtenti(ruolo)));
    const delHid = fn(() => { if(!confirm('Eliminare?')) return; sb('utenti?id=eq.'+s.id,{method:'DELETE'}).then(()=>loadUtenti(ruolo)); });
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#000;flex-shrink:0">${ini(s.nome)}</div><div style="font-weight:600;font-size:.875rem">${esc(s.nome)}</div></div></td>
      <td><span style="font-family:monospace;font-size:.82rem;background:var(--bg3);padding:2px 8px;border-radius:5px">${esc(s.username)}</span></td>
      <td style="color:var(--text2);font-size:.82rem">${esc(s.email||'—')}</td>
      <td><span class="badge ${s.attivo?'badge-green':'badge-red'}">${s.attivo?'Attivo':'Disattivo'}</span></td>
      <td style="color:var(--text3);font-size:.78rem">${fmtD(s.created_at)}</td>
      <td><div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" data-click="${editHid}">✏️</button>
        <button class="btn ${s.attivo?'btn-red':'btn-cyan'} btn-sm" data-click="${togHid}">${s.attivo?'🔒':'🔓'}</button>
        <button class="btn btn-red btn-sm" data-click="${delHid}">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');

  let modalHtml = '';
  if (showM) {
    const saveHid = fn(() => {
      if (!form.username||!form.password||!form.nome) return;
      const p = eid ? sb('utenti?id=eq.'+eid,{method:'PATCH',body:JSON.stringify(form)}) : sb('utenti',{method:'POST',body:JSON.stringify(Object.assign({},form,{ruolo}))});
      p.then(() => { setState('ut_showm_'+ruolo,false); setState('ut_eid_'+ruolo,null); setState('ut_form_'+ruolo,{username:'',password:'',nome:'',email:'',attivo:true}); loadUtenti(ruolo); });
    });
    const closeHid = fn(() => { setState('ut_showm_'+ruolo,false); setState('ut_eid_'+ruolo,null); });
    modalHtml = `<div class="modal-overlay" data-click="${closeHid}"><div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" data-click="${closeHid}">✕</button>
      <div style="font-size:1.15rem;font-weight:700;margin-bottom:22px">${eid?'Modifica':'Nuovo '+label.slice(0,-1)}</div>
      <div class="grid2">
        ${ffld('Nome *', `<input value="${esc(form.nome)}" data-input="${fn(e=>setState('ut_form_'+ruolo,Object.assign({},form,{nome:e.target.value})))}" placeholder="Mario Rossi" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
        ${ffld('Email', `<input type="email" value="${esc(form.email||'')}" data-input="${fn(e=>setState('ut_form_'+ruolo,Object.assign({},form,{email:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      </div>
      <div class="grid2">
        ${ffld('Username *', `<input value="${esc(form.username)}" data-input="${fn(e=>setState('ut_form_'+ruolo,Object.assign({},form,{username:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
        ${ffld('Password *', `<input value="${esc(form.password)}" data-input="${fn(e=>setState('ut_form_'+ruolo,Object.assign({},form,{password:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      </div>
      ${ffld('Stato', `<select data-change="${fn(e=>setState('ut_form_'+ruolo,Object.assign({},form,{attivo:e.target.value==='si'})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none"><option value="si" ${form.attivo?'selected':''}>✅ Attivo</option><option value="no" ${!form.attivo?'selected':''}>🔒 Disattivo</option></select>`)}
      <button class="btn btn-gold" style="width:100%;margin-top:8px" data-click="${saveHid}">💾 Salva</button>
    </div></div>`;
  }

  return `<div>
    <div class="page-hdr"><div class="flex-between">
      <div><h1>👥 ${esc(label)}</h1><p>Gestisci gli ${esc(label.toLowerCase())}</p></div>
      <div style="display:flex;gap:10px">
        <input style="padding:9px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;color:var(--text);outline:none;width:180px;font-family:inherit;font-size:.855rem" placeholder="🔍 Cerca..." value="${esc(src)}" data-input="${srcHid}">
        <button class="btn btn-gold" data-click="${newHid}">+ Aggiungi</button>
      </div>
    </div></div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="tbl">
        <thead><tr><th>Nome</th><th>Username</th><th>Email</th><th>Stato</th><th>Iscritto</th><th>Azioni</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${filt.length===0?'<div style="text-align:center;padding:40px;color:var(--text3)">Nessun utente trovato.</div>':''}
    </div>
    ${modalHtml}
  </div>`;
}

// ── COMMUNITY ────────────────────────────────────
function loadCommunity() { sb('community_posts?order=pinnato.desc,created_at.desc').then(r => setState('cm_posts', r)); }

function renderCommunity() {
  const user = getState('user', {});
  const posts = getState('cm_posts', null);
  if (posts === null) { loadCommunity(); return '<div style="text-align:center;padding:40px;color:var(--text3)">⏳ Caricamento...</div>'; }
  const filt = getState('cm_filt', 'tutti');
  const txt = getState('cm_txt', '');
  const cat = getState('cm_cat', 'generale');
  const open = getState('cm_open', {});
  const comm = getState('cm_comm', {});
  const nc = getState('cm_nc', {});
  const isAdmin = user.ruolo === 'admin';
  const catLbl = {generale:'💬 Generale',domande:'❓ Domande',successi:'🏆 Successi',risorse:'📁 Risorse'};
  const catCls = {generale:'badge badge-gray',domande:'badge badge-cyan',successi:'badge badge-gold',risorse:'badge badge-purple'};
  const cats = ['tutti','generale','domande','successi','risorse'];

  const pubHid = fn(() => {
    const t = getState('cm_txt','');
    if (!t.trim()) return;
    const c = getState('cm_cat','generale');
    sb('community_posts',{method:'POST',body:JSON.stringify({autore_id:user.id,autore_nome:user.nome,autore_ruolo:user.ruolo,contenuto:t,categoria:c,like_count:0})}).then(()=>{ setState('cm_txt',''); loadCommunity(); });
  });
  const txtHid = fn(e => setState('cm_txt', e.target.value));
  const catHid = fn(e => setState('cm_cat', e.target.value));

  const filtered = filt==='tutti' ? posts : posts.filter(p => p.categoria===filt);

  const postsHtml = filtered.map(post => {
    const likeHid = fn(() => sb('community_posts?id=eq.'+post.id,{method:'PATCH',body:JSON.stringify({like_count:(post.like_count||0)+1})}).then(loadCommunity));
    const pinHid = isAdmin ? fn(() => sb('community_posts?id=eq.'+post.id,{method:'PATCH',body:JSON.stringify({pinnato:!post.pinnato})}).then(loadCommunity)) : null;
    const delHid = isAdmin ? fn(() => { if(!confirm('Eliminare?')) return; sb('community_posts?id=eq.'+post.id,{method:'DELETE'}).then(loadCommunity); }) : null;
    const togCommHid = fn(() => {
      const cur = getState('cm_open',{});
      const next = !cur[post.id];
      setState('cm_open', Object.assign({},cur,{[post.id]:next}));
      if (next && !getState('cm_comm',{})[post.id]) {
        sb('commenti?post_id=eq.'+post.id+'&order=created_at.asc').then(r => { const c=getState('cm_comm',{}); setState('cm_comm',Object.assign({},c,{[post.id]:r})); });
      }
    });
    const pubCommHid = fn(() => {
      const t = (getState('cm_nc',{})[post.id]||'').trim();
      if (!t) return;
      sb('commenti',{method:'POST',body:JSON.stringify({post_id:post.id,autore_id:user.id,autore_nome:user.nome,contenuto:t})}).then(()=>{
        const ncur = getState('cm_nc',{}); setState('cm_nc',Object.assign({},ncur,{[post.id]:''}));
        sb('commenti?post_id=eq.'+post.id+'&order=created_at.asc').then(r=>{ const c=getState('cm_comm',{}); setState('cm_comm',Object.assign({},c,{[post.id]:r})); });
      });
    });
    const ncHid = fn(e => { const cur=getState('cm_nc',{}); setState('cm_nc',Object.assign({},cur,{[post.id]:e.target.value})); });

    const commHtml = open[post.id] ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border2)">
      ${(comm[post.id]||[]).map(c=>`<div style="display:flex;gap:8px;margin-bottom:8px"><div style="width:28px;height:28px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0">${ini(c.autore_nome)}</div><div style="background:var(--bg3);border-radius:8px;padding:7px 11px;flex:1"><div style="font-size:.7rem;font-weight:600;color:var(--text2);margin-bottom:2px">${esc(c.autore_nome)}</div><div style="font-size:.855rem">${esc(c.contenuto)}</div></div></div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:6px">
        <input value="${esc((nc[post.id]||''))}" data-input="${ncHid}" placeholder="Scrivi un commento..." style="flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:.855rem;font-family:inherit;outline:none">
        <button class="btn btn-gold btn-sm" data-click="${pubCommHid}">➤</button>
      </div>
    </div>` : '';

    return `<div class="card" style="margin-bottom:12px;border-color:${post.pinnato?'var(--border)':'var(--border2)'}">
      ${post.pinnato?'<div style="font-size:.7rem;color:var(--gold);font-weight:700;margin-bottom:10px">📌 POST PINNATO</div>':''}
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div class="post-av">${ini(post.autore_nome)}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:.875rem">${esc(post.autore_nome)}${post.autore_ruolo==='admin'?'<span class="badge badge-gold" style="margin-left:6px">Manager</span>':''}${post.autore_ruolo==='istruttore'?'<span class="badge badge-purple" style="margin-left:6px">Istruttore</span>':''}</div>
          <div style="font-size:.72rem;color:var(--text3);display:flex;align-items:center;gap:6px;flex-wrap:wrap">${ago(post.created_at)} <span class="${catCls[post.categoria]||'badge badge-gray'}">${esc(catLbl[post.categoria]||post.categoria)}</span></div>
        </div>
        ${isAdmin?`<div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" data-click="${pinHid}">${post.pinnato?'📌':'📍'}</button><button class="btn btn-red btn-sm" data-click="${delHid}">🗑️</button></div>`:''}
      </div>
      <p style="font-size:.9rem;line-height:1.7">${esc(post.contenuto)}</p>
      <div style="display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border2)">
        <button class="pact" data-click="${likeHid}">❤️ ${post.like_count||0}</button>
        <button class="pact" data-click="${togCommHid}">💬 Commenti</button>
      </div>
      ${commHtml}
    </div>`;
  }).join('');

  const filtBtns = cats.map(c => {
    const hid = fn(() => setState('cm_filt', c));
    return `<button class="sb-btn ${filt===c?'active':''}" style="width:100%;margin-bottom:3px" data-click="${hid}">${c==='tutti'?'🌐 Tutti':catLbl[c]}</button>`;
  }).join('');

  return `<div>
    <div class="page-hdr"><h1>💬 Community</h1><p>Condividi, impara e cresci con gli altri membri</p></div>
    <div style="display:grid;grid-template-columns:1fr 260px;gap:20px;align-items:start">
      <div>
        <div class="card" style="margin-bottom:18px">
          <div style="font-weight:700;margin-bottom:12px;font-size:.9rem">✍️ Scrivi qualcosa</div>
          <textarea data-input="${txtHid}" placeholder="Condividi un pensiero, una domanda, un successo..." style="width:100%;padding:10px 12px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-family:inherit;font-size:.875rem;outline:none;resize:vertical;min-height:80px;display:block;margin-bottom:10px">${esc(txt)}</textarea>
          <div style="display:flex;align-items:center;gap:10px">
            <select data-change="${catHid}" style="padding:7px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:.82rem;font-family:inherit;outline:none">
              <option value="generale" ${cat==='generale'?'selected':''}>💬 Generale</option>
              <option value="domande" ${cat==='domande'?'selected':''}>❓ Domande</option>
              <option value="successi" ${cat==='successi'?'selected':''}>🏆 Successi</option>
              <option value="risorse" ${cat==='risorse'?'selected':''}>📁 Risorse</option>
            </select>
            <button class="btn btn-gold btn-sm" data-click="${pubHid}">📤 Pubblica</button>
          </div>
        </div>
        ${postsHtml}
        ${filtered.length===0?'<div style="text-align:center;color:var(--text3);padding:40px">Nessun post ancora. Scrivi il primo! 🚀</div>':''}
      </div>
      <div>
        <div class="card" style="margin-bottom:14px"><div style="font-weight:700;font-size:.82rem;margin-bottom:10px">🔍 Filtra</div>${filtBtns}</div>
        <div class="card"><div style="font-weight:700;font-size:.82rem;margin-bottom:12px">📊 Stats</div>
          <div style="font-size:.82rem;color:var(--text2);line-height:2.2">
            <div>Post totali: <strong style="color:var(--text)">${posts.length}</strong></div>
            <div>Pinnati: <strong style="color:var(--gold)">${posts.filter(p=>p.pinnato).length}</strong></div>
            <div>Like: <strong style="color:var(--red)">${posts.reduce((a,p)=>a+(p.like_count||0),0)}</strong></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── RISORSE ──────────────────────────────────────
function loadRisorse() { sb('risorse?order=created_at.desc').then(r => setState('rs_lista', r)); }

function renderRisorse() {
  const user = getState('user', {});
  const lista = getState('rs_lista', null);
  if (lista === null) { loadRisorse(); return '<div style="text-align:center;padding:40px;color:var(--text3)">⏳ Caricamento...</div>'; }
  const filt = getState('rs_filt', 'tutti');
  const canEdit = user.ruolo==='admin'||user.ruolo==='istruttore';
  const showM = getState('rs_showm', false);
  const form = getState('rs_form', {titolo:'',descrizione:'',url:'',tipo:'pdf',categoria:'generale',autore_nome:user.nome});
  const eid = getState('rs_eid', null);
  const tipi = ['tutti','pdf','template','checklist','video','altro'];
  const tipoIcon = {pdf:'📄',template:'📋',checklist:'✅',video:'🎬',altro:'📦'};
  const tipoCls = {pdf:'badge badge-gold',template:'badge badge-cyan',checklist:'badge badge-green',video:'badge badge-purple',altro:'badge badge-gray'};

  const filtBtns = tipi.map(t => {
    const hid = fn(() => setState('rs_filt', t));
    return `<button class="btn btn-ghost btn-sm" style="${filt===t?'background:rgba(245,158,11,.15);color:var(--gold);border-color:var(--border)':''}" data-click="${hid}">${tipoIcon[t]||'📦'} ${t.charAt(0).toUpperCase()+t.slice(1)}</button>`;
  }).join('');

  const items = (filt==='tutti'?lista:lista.filter(r=>r.tipo===filt)).map(r => {
    const editHid = canEdit ? fn(() => { setState('rs_form',{titolo:r.titolo,descrizione:r.descrizione||'',url:r.url,tipo:r.tipo,categoria:r.categoria,autore_nome:r.autore_nome||''}); setState('rs_eid',r.id); setState('rs_showm',true); }) : null;
    const delHid = canEdit ? fn(() => { if(!confirm('Eliminare?')) return; sb('risorse?id=eq.'+r.id,{method:'DELETE'}).then(loadRisorse); }) : null;
    return `<div class="card">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(245,158,11,.10);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:14px">${tipoIcon[r.tipo]||'📦'}</div>
      <div style="font-weight:700;margin-bottom:5px">${esc(r.titolo)}</div>
      <div style="font-size:.8rem;color:var(--text2);margin-bottom:12px;line-height:1.5">${esc(r.descrizione||'')}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px"><span class="${tipoCls[r.tipo]||'badge badge-gray'}">${esc(r.tipo)}</span><span style="font-size:.72rem;color:var(--text3)">by ${esc(r.autore_nome||'Academy')}</span></div>
      <div style="display:flex;gap:8px">
        <a href="${esc(r.url)}" target="_blank" class="btn btn-gold btn-sm" style="text-decoration:none;flex:1;justify-content:center">⬇️ Scarica</a>
        ${canEdit?`<button class="btn btn-ghost btn-sm" data-click="${editHid}">✏️</button><button class="btn btn-red btn-sm" data-click="${delHid}">🗑️</button>`:''}
      </div>
    </div>`;
  }).join('');

  const newHid = fn(() => { setState('rs_form',{titolo:'',descrizione:'',url:'',tipo:'pdf',categoria:'generale',autore_nome:user.nome}); setState('rs_eid',null); setState('rs_showm',true); });
  const closeHid = fn(() => setState('rs_showm', false));
  const saveHid = fn(() => {
    const f = getState('rs_form',{});
    if (!f.titolo||!f.url) return;
    const p = eid ? sb('risorse?id=eq.'+eid,{method:'PATCH',body:JSON.stringify(f)}) : sb('risorse',{method:'POST',body:JSON.stringify(f)});
    p.then(()=>{ setState('rs_showm',false); setState('rs_eid',null); loadRisorse(); });
  });

  let modalHtml = '';
  if (showM) {
    const f = form;
    modalHtml = `<div class="modal-overlay" data-click="${closeHid}"><div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" data-click="${closeHid}">✕</button>
      <div style="font-size:1.15rem;font-weight:700;margin-bottom:22px">${eid?'Modifica risorsa':'Nuova risorsa'}</div>
      ${ffld('Titolo *', `<input value="${esc(f.titolo)}" data-input="${fn(e=>setState('rs_form',Object.assign({},f,{titolo:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      ${ffld('Descrizione', `<textarea data-input="${fn(e=>setState('rs_form',Object.assign({},f,{descrizione:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none;resize:vertical;min-height:80px;display:block">${esc(f.descrizione||'')}</textarea>`)}
      ${ffld('URL *', `<input value="${esc(f.url)}" data-input="${fn(e=>setState('rs_form',Object.assign({},f,{url:e.target.value})))}" placeholder="https://..." style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      ${ffld('Tipo', `<select data-change="${fn(e=>setState('rs_form',Object.assign({},f,{tipo:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none"><option value="pdf">📄 PDF</option><option value="template">📋 Template</option><option value="checklist">✅ Checklist</option><option value="video">🎬 Video</option><option value="altro">📦 Altro</option></select>`)}
      <button class="btn btn-gold" style="width:100%;margin-top:8px" data-click="${saveHid}">💾 Salva</button>
    </div></div>`;
  }

  return `<div>
    <div class="page-hdr"><div class="flex-between"><div><h1>📁 Risorse</h1><p>PDF, template, checklist e materiali esclusivi</p></div>${canEdit?`<button class="btn btn-gold" data-click="${newHid}">+ Aggiungi</button>`:''}</div></div>
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">${filtBtns}</div>
    <div class="g3">${items}</div>
    ${items.length===0?'<div style="text-align:center;color:var(--text3);padding:50px">Nessuna risorsa disponibile.</div>':''}
    ${modalHtml}
  </div>`;
}

// ── LIVE ─────────────────────────────────────────
function loadLive() { sb('live_sessioni?order=data_ora.desc').then(r => setState('lv_lista', r)); }

function renderLive() {
  const user = getState('user', {});
  const lista = getState('lv_lista', null);
  if (lista === null) { loadLive(); return '<div style="text-align:center;padding:40px;color:var(--text3)">⏳ Caricamento...</div>'; }
  const isAdmin = user.ruolo==='admin';
  const showM = getState('lv_showm', false);
  const form = getState('lv_form', {titolo:'',descrizione:'',data_ora:'',url_join:'',url_replay:'',istruttore_nome:user.nome,durata_minuti:60});
  const eid = getState('lv_eid', null);
  const now = new Date();
  const future = lista.filter(s => !s.completata && s.data_ora && new Date(s.data_ora)>now);
  const replay = lista.filter(s => s.url_replay);

  const newHid = fn(() => { setState('lv_form',{titolo:'',descrizione:'',data_ora:'',url_join:'',url_replay:'',istruttore_nome:user.nome,durata_minuti:60}); setState('lv_eid',null); setState('lv_showm',true); });
  const closeHid = fn(() => setState('lv_showm', false));
  const saveHid = fn(() => {
    const f = getState('lv_form',{});
    if (!f.titolo) return;
    const p = eid ? sb('live_sessioni?id=eq.'+eid,{method:'PATCH',body:JSON.stringify(f)}) : sb('live_sessioni',{method:'POST',body:JSON.stringify(f)});
    p.then(()=>{ setState('lv_showm',false); setState('lv_eid',null); loadLive(); });
  });

  const futureHtml = future.map(s => {
    const dt = s.data_ora ? new Date(s.data_ora) : null;
    const editHid = isAdmin ? fn(() => { setState('lv_form',{titolo:s.titolo,descrizione:s.descrizione||'',data_ora:s.data_ora||'',url_join:s.url_join||'',url_replay:s.url_replay||'',istruttore_nome:s.istruttore_nome||'',durata_minuti:s.durata_minuti||60}); setState('lv_eid',s.id); setState('lv_showm',true); }) : null;
    const delHid = isAdmin ? fn(() => { if(!confirm('Eliminare?')) return; sb('live_sessioni?id=eq.'+s.id,{method:'DELETE'}).then(loadLive); }) : null;
    return `<div class="card" style="margin-bottom:10px;display:flex;align-items:center;gap:18px">
      <div style="width:56px;height:56px;border-radius:12px;background:rgba(245,158,11,.10);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        ${dt?`<div style="text-align:center"><div style="font-size:1.2rem;font-weight:800;color:var(--gold);line-height:1">${dt.getDate()}</div><div style="font-size:.62rem;color:var(--text3);text-transform:uppercase">${dt.toLocaleDateString('it-IT',{month:'short'})}</div></div>`:'<span style="font-size:1.5rem">📅</span>'}
      </div>
      <div style="flex:1">
        <div style="font-weight:700;margin-bottom:3px">${esc(s.titolo)}</div>
        <div style="font-size:.8rem;color:var(--text2)">${esc(s.istruttore_nome||'')}${dt?' · '+dt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):''} · ${s.durata_minuti} min</div>
      </div>
      <div style="display:flex;gap:8px">
        ${s.url_join?`<a href="${esc(s.url_join)}" target="_blank" class="btn btn-gold btn-sm" style="text-decoration:none">🔴 Partecipa</a>`:''}
        ${isAdmin?`<button class="btn btn-ghost btn-sm" data-click="${editHid}">✏️</button><button class="btn btn-red btn-sm" data-click="${delHid}">🗑️</button>`:''}
      </div>
    </div>`;
  }).join('');

  const replayHtml = replay.map(s => {
    const vid = ytId(s.url_replay);
    const editHid = isAdmin ? fn(() => { setState('lv_form',{titolo:s.titolo,descrizione:s.descrizione||'',data_ora:s.data_ora||'',url_join:s.url_join||'',url_replay:s.url_replay||'',istruttore_nome:s.istruttore_nome||'',durata_minuti:s.durata_minuti||60}); setState('lv_eid',s.id); setState('lv_showm',true); }) : null;
    const delHid = isAdmin ? fn(() => { if(!confirm('Eliminare?')) return; sb('live_sessioni?id=eq.'+s.id,{method:'DELETE'}).then(loadLive); }) : null;
    return `<div class="card">
      ${vid?`<div class="vw" style="margin-bottom:12px"><iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen title="${esc(s.titolo)}"></iframe></div>`:`<div style="height:120px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:12px">🎬</div>`}
      <div style="font-weight:700;margin-bottom:4px">${esc(s.titolo)}</div>
      <div style="font-size:.78rem;color:var(--text2);margin-bottom:10px">${esc(s.istruttore_nome||'')} · ${fmtD(s.data_ora)}</div>
      ${isAdmin?`<div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" data-click="${editHid}">✏️</button><button class="btn btn-red btn-sm" data-click="${delHid}">🗑️</button></div>`:''}
    </div>`;
  }).join('');

  let modalHtml = '';
  if (showM) {
    const f = form;
    modalHtml = `<div class="modal-overlay" data-click="${closeHid}"><div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" data-click="${closeHid}">✕</button>
      <div style="font-size:1.15rem;font-weight:700;margin-bottom:22px">${eid?'Modifica sessione':'Nuova sessione live'}</div>
      ${ffld('Titolo *', `<input value="${esc(f.titolo)}" data-input="${fn(e=>setState('lv_form',Object.assign({},f,{titolo:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      <div class="grid2">
        ${ffld('Data e ora', `<input type="datetime-local" value="${esc(f.data_ora||'')}" data-input="${fn(e=>setState('lv_form',Object.assign({},f,{data_ora:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
        ${ffld('Durata (min)', `<input type="number" value="${f.durata_minuti||60}" data-input="${fn(e=>setState('lv_form',Object.assign({},f,{durata_minuti:+e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      </div>
      ${ffld('Istruttore', `<input value="${esc(f.istruttore_nome||'')}" data-input="${fn(e=>setState('lv_form',Object.assign({},f,{istruttore_nome:e.target.value})))}" style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      ${ffld('Link Zoom/Meet', `<input value="${esc(f.url_join||'')}" data-input="${fn(e=>setState('lv_form',Object.assign({},f,{url_join:e.target.value})))}" placeholder="https://zoom.us/..." style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      ${ffld('Link Replay YouTube', `<input value="${esc(f.url_replay||'')}" data-input="${fn(e=>setState('lv_form',Object.assign({},f,{url_replay:e.target.value})))}" placeholder="https://youtube.com/watch?v=..." style="width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;font-size:.875rem;color:var(--text);font-family:inherit;outline:none">`)}
      <button class="btn btn-gold" style="width:100%;margin-top:8px" data-click="${saveHid}">💾 Salva</button>
    </div></div>`;
  }

  return `<div>
    <div class="page-hdr"><div class="flex-between"><div><h1>🎥 Live &amp; Replay</h1><p>Sessioni dal vivo e registrazioni</p></div>${isAdmin?`<button class="btn btn-gold" data-click="${newHid}">+ Nuova sessione</button>`:''}</div></div>
    ${future.length>0?`<div style="margin-bottom:28px"><div style="font-weight:700;font-size:1rem;margin-bottom:14px;color:var(--gold)">📅 Prossime live</div>${futureHtml}</div>`:''}
    ${replay.length>0?`<div><div style="font-weight:700;font-size:1rem;margin-bottom:14px">🎬 Replay disponibili</div><div class="g3">${replayHtml}</div></div>`:''}
    ${lista.length===0?'<div style="text-align:center;color:var(--text3);padding:50px">Nessuna sessione programmata.</div>':''}
    ${modalHtml}
  </div>`;
}

// ── MAIN RENDER ──────────────────────────────────
function renderApp() {
  _handlers = {};
  _hid = 0;
  const user = getState('user', null);
  if (!user) return renderLogin();
  const tab = getState('tab', 'dashboard');
  const isAdmin = user.ruolo === 'admin';
  let content = '';
  if (tab==='dashboard') content = renderDashboard();
  else if (tab==='corsi') content = isAdmin ? renderAdminCorsi() : renderCorsi();
  else if (tab==='studenti') content = renderUtenti('studente');
  else if (tab==='istruttori') content = renderUtenti('istruttore');
  else if (tab==='community') content = renderCommunity();
  else if (tab==='risorse') content = renderRisorse();
  else if (tab==='live') content = renderLive();
  return `<div class="layout">
    ${renderSidebar()}
    <div class="main-area">
      ${renderTopbar()}
      <div class="content">${content}</div>
    </div>
  </div>`;
}

_rootEl = document.getElementById('app');
_renderFn = renderApp;
rerender();
</script>
</body>
</html>
